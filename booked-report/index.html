<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATAFORCE — Weekly Summary (Booked)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow-x: hidden; background: #e8eaee; font-family: 'Inter', sans-serif; }

  .dash { padding: 8px; min-height: 100vh; }

  /* HEADER */
  .header {
    background: #0d1f3c;
    border-radius: 6px;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo img { height: 28px; }
  .logo-text { color: #7aaed5; font-size: 11px; font-weight: 300; letter-spacing: 2px; }
  .hdr-mid { color: #7aaed5; font-size: 10px; font-weight: 300; letter-spacing: 1px; text-align: center; flex: 1; }
  .hdr-right { text-align: right; }
  .week-num { color: #fff; font-size: 13px; font-weight: 400; letter-spacing: 1px; }
  .week-dates { color: #7aaed5; font-size: 9px; font-weight: 300; }
  .conn-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #888; margin-right: 4px; }
  .conn-dot.live { background: #22c55e; }
  .conn-label { color: #7aaed5; font-size: 9px; }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0,1fr));
    gap: 10px;
    padding: 0 4px;
  }

  /* CARD */
  .card {
    background: #fff;
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid #d0d4dc;
    transition: opacity 0.3s;
  }
  .card.nodata { opacity: 0.45; }
  .card-hdr {
    background: #fff;
    padding: 8px 10px;
    border-bottom: 2px solid #093c71;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 38px;
  }
  .biz-name { color: #093c71; font-size: 12px; font-weight: 500; letter-spacing: 0.3px; }
  .biz-logo { height: 22px; max-width: 60px; object-fit: contain; }

  /* KPIS */
  .kpis {
    display: flex;
    padding: 5px 6px;
    border-bottom: 1px solid #eee;
    background: #f8f9fc;
    gap: 2px;
  }
  .kpi { flex: 1; text-align: center; }
  .kpi-lbl { font-size: 7.5px; color: #aaa; text-transform: uppercase; letter-spacing: 0.3px; }
  .kpi-val { font-size: 12px; font-weight: 500; color: #0d1f3c; line-height: 1.3; }
  .kpi-val.nodata-val { color: #ccc; font-weight: 300; }
  .kpi-var { font-size: 8px; }
  .kpi-comp-lbl { color: #bbb; font-size: 7px; font-weight: 300; margin-right: 1px; }
  .up { color: #15803d; }
  .dn { color: #b91c1c; }
  .na { color: #ccc; }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; font-size: 9.5px; }
  thead tr { background: #fff; border-bottom: 1.5px solid #093c71; }
  th { color: #093c71; padding: 4px 6px; text-align: right; font-weight: 500; font-size: 9px; border-bottom: 1.5px solid #093c71; }
  th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid #f5f5f5; }
  tbody tr:hover { background: #f5f8ff; }
  td { padding: 2px 5px; text-align: right; color: #444; font-weight: 400; }
  td:first-child { text-align: left; color: #666; max-width: 75px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nodata-cell { text-align: center; color: #ccc; padding: 10px; font-style: italic; font-size: 9.5px; }

  /* LOADING */
  .loading { text-align: center; color: #7aaed5; padding: 40px; font-size: 12px; }

  /* ── MOBILE RESPONSIVE ── */
  @media (max-width: 768px) {
    .dash { padding: 6px; }

    /* Header: flex-wrap so logo+right stay on row 1, mid-section spans row 2 */
    .header {
      flex-wrap: wrap;
      padding: 10px 12px;
      gap: 0;
    }

    /* Row 1 left: logo */
    #hdr-logo {
      order: 1;
      flex: 1 1 50%;
      align-items: center;
    }
    #hdr-logo img { height: 30px; }

    /* Row 1 right: live dot + week + dates */
    .hdr-right {
      order: 2;
      flex: 1 1 50%;
      text-align: right;
    }
    .week-num { font-size: 13px; }
    .week-dates { font-size: 10px; }

    /* Row 2: WEEKLY SUMMARY / ALL BUSINESSES / buttons — full width, centred */
    .hdr-mid-section {
      order: 3;
      flex: 1 1 100%;
      text-align: center;
      margin-top: 10px;
    }
    .hdr-title-1 { font-size: 16px !important; }
    .hdr-title-2 { font-size: 12px !important; }

    /* Toggle buttons — larger tap targets */
    .header button {
      font-size: 12px !important;
      padding: 5px 16px !important;
    }

    /* Grid: single column */
    .grid {
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 0;
    }

    /* Card internals: one size bigger than desktop */
    .biz-name { font-size: 15px; }
    .biz-logo { height: 28px; max-width: 84px; }
    .card-hdr { padding: 10px 12px; min-height: 46px; }

    .kpi-lbl { font-size: 9px; }
    .kpi-val { font-size: 17px; }
    .kpi-var { font-size: 11px; }

    table { font-size: 13px; }
    th { font-size: 11px; padding: 5px 8px; }
    td { padding: 4px 8px; }
    td:first-child { max-width: none; } /* show full names on mobile */
  }

  /* TABLE SCROLL CONTAINER */
  .table-scroll { 
    max-height: 155px; /* Header + 6 data rows */
    overflow-y: auto;
    overflow-x: hidden;
  }
  
  .table-scroll::-webkit-scrollbar {
    width: 5px;
  }
  .table-scroll::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 3px;
  }
  .table-scroll::-webkit-scrollbar-thumb {
    background: #bbb;
    border-radius: 3px;
  }
  .table-scroll::-webkit-scrollbar-thumb:hover {
    background: #888;
  }

  @media (max-width: 768px) {
    .table-scroll {
      max-height: none;
      overflow-y: visible;
    }
  }
</style>
</head>

// Week header calculation — CURRENT week (Mon → Sun) for booked view
(function(){
  const now = new Date();
  const dow = now.getDay(); // 0=Sun, 1=Mon, ... 6=Sat
  // Days back to this week's Monday: Sun=6, Mon=0, Tue=1 ... Sat=5
  const dBack = dow === 0 ? 6 : dow - 1;
  const thisMonday = new Date(now); thisMonday.setHours(0,0,0,0); thisMonday.setDate(now.getDate()-dBack);
  const thisSunday = new Date(thisMonday); thisSunday.setDate(thisMonday.getDate()+6);
  // ISO week via Thursday
  const thursday = new Date(thisMonday); thursday.setDate(thisMonday.getDate()+3);
  const jan1 = new Date(thursday.getFullYear(),0,1);
  const wk = Math.ceil((((thursday-jan1)/86400000)+1)/7);
  const f = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('weekLabel').textContent = `WEEK ${wk} / ${thursday.getFullYear()}`;
  document.getElementById('datesLabel').textContent = `${f(thisMonday)} – ${f(thisSunday)}`;
})();

let MODE = 'lw'; // 'lw' or 'ytd'

function setMode(mode) {
  MODE = mode;
  document.getElementById('btn-lw').style.background  = mode === 'lw'  ? '#1a3360' : 'transparent';
  document.getElementById('btn-lw').style.color        = mode === 'lw'  ? '#fff'    : '#7aaed5';
  document.getElementById('btn-ytd').style.background  = mode === 'ytd' ? '#1a3360' : 'transparent';
  document.getElementById('btn-ytd').style.color        = mode === 'ytd' ? '#fff'    : '#7aaed5';
  document.getElementById('btn-q1').style.background   = mode === 'q1'  ? '#1a3360' : 'transparent';
  document.getElementById('btn-q1').style.color         = mode === 'q1'  ? '#fff'    : '#7aaed5';
  // Re-render all cards with stored data
  if (window._allData) {
    const grid = document.getElementById('grid');
    grid.innerHTML = BIZ_CONFIG.map((cfg, i) => buildCard(cfg, window._allData[i])).join('');
  }
}

const n = (v, d=2) => v == null ? '—' : Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const nK = v => {
  if (v == null) return '—';
  const abs = Math.abs(v);
  if (abs >= 1000000) return (v/1000000).toFixed(1)+'M';
  if (abs >= 1000) return (v/1000).toFixed(0)+'K';
  return Math.round(v).toLocaleString('en-US');
};
const pct = v => {
  if (v == null) return '<span class="na">—</span>';
  const cls = v >= 0 ? 'up' : 'dn';
  const arr = v >= 0 ? '▲' : '▼';
  return `<span class="${cls}">${arr}${Math.abs(v).toFixed(1)}%</span>`;
};

function buildCard(cfg, data) {
  const k = data?.kpis;
  const lw = k?.lw;
  const ytd = k?.ytd;
  const q1  = k?.q1;
  const period = MODE === 'ytd' ? ytd : MODE === 'q1' ? q1 : lw;
  const hasData = period && period.tons != null;
  // Comparison label: 'LW' (vs last week) for THIS WEEK mode, '25\'' for YTD/Q1
  const compLbl = MODE === 'lw' ? 'LW' : "25'";

  const suffix = MODE === 'ytd' ? '_ytd' : MODE === 'q1' ? '_q1' : '';
  const gsaRows   = (data?.['gsaTable'   + suffix] || data?.gsaTable   || []).slice(0, 10);
  const salesRows = (data?.['salesTable' + suffix] || data?.salesTable || []).slice(0, 10);
  const oriRows   = (data?.['oriTable'   + suffix] || data?.oriTable   || []).slice(0, 10);

  let rows = [];
  if (cfg.dbCol === 'GSA_SName') rows = gsaRows;
  else if (cfg.dbCol === 'Bkg_SalesPerson') rows = salesRows;
  else if (cfg.dbCol === 'Bkg_Ori') rows = oriRows;

  const tableRows = rows.length > 0
    ? rows.map(r => `<tr><td>${r.name??'—'}</td><td>${n(r.tons)}</td><td>${n(Math.round(r.tons*1000*r.pkg),0)}</td><td>${n(r.pkg)}</td></tr>`).join('')
    : `<tr><td colspan="4" class="nodata-cell">No data this week</td></tr>`;

  return `
  <div class="card ${hasData ? '' : 'nodata'}" id="card-${cfg.key}">
    <div class="card-hdr">
        <div class="biz-name">${cfg.name}</div>
        ${cfg.logo ? `<img class="biz-logo" src="${cfg.logo}" alt="${cfg.name}">` : ''}
      </div>
    <div class="kpis">
      <div class="kpi">
        <div class="kpi-lbl">Tons</div>
        <div class="kpi-val ${hasData?'':'nodata-val'}">${hasData ? n(period.tons) : '—'}</div>
        <div class="kpi-var"><span class="kpi-comp-lbl">${compLbl}</span>${hasData ? pct(period.tons_vs25) : '<span class="na">—</span>'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Profit</div>
        <div class="kpi-val ${hasData?'':'nodata-val'}">${hasData ? nK(period.profit) : '—'}</div>
        <div class="kpi-var"><span class="kpi-comp-lbl">${compLbl}</span>${hasData ? pct(period.profit_vs25) : '<span class="na">—</span>'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">P/KG</div>
        <div class="kpi-val ${hasData?'':'nodata-val'}">${hasData && period.pkg ? n(period.pkg) : '—'}</div>
        <div class="kpi-var"><span class="kpi-comp-lbl">${compLbl}</span>${hasData ? pct(period.pkg_vs25) : '<span class="na">—</span>'}</div>
      </div>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr><th>${cfg.col}</th><th>Tons</th><th>Profit</th><th>P/KG</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  </div>`;
}

async function loadSummary() {
  const grid = document.getElementById('grid');
  const userEmail = getUserEmail();  // ← GET EMAIL ONCE, OUTSIDE THE LOOP
  console.log('User email:', userEmail);
  
   try {
       // Check if user has access to booked module
       if (!userEmail) {
         window.location.href = './index.html';
         return;
       }
       
       // Load all businesses in parallel
       const results = await Promise.all(
         BIZ_CONFIG.map(cfg =>
           fetch(`${API_BASE}/api/dashboard?biz=${cfg.key}&date_col=Bkg_CreaDate&week_mode=current&email=${encodeURIComponent(userEmail)}`, {headers:{"x-api-key":API_KEY}})
             .then(r => r.ok ? r.json() : null)
             .catch(() => null)
         )
       );
       
    // Validate access
    if (results[0] && results[0].allowed === false) {
      window.location.href = './index.html';
      return;
    }
    window._allData = results;
    grid.innerHTML = BIZ_CONFIG.map((cfg, i) => buildCard(cfg, results[i])).join('');
    document.getElementById('connDot').classList.add('live');
    document.getElementById('connLabel').textContent = 'Live · MySQL';
  } catch(e) {
    grid.innerHTML = `<div class="loading" style="grid-column:1/-1;color:#b91c1c;">Error loading data. Please refresh.</div>`;
  }
}


loadSummary();
</script>
</body>
</html>
