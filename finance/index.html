<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance - DATAFORCE</title>
<link rel="stylesheet" href="../dataforce-shell.css">
<style>
:root {
  --navy: #0d1f3c;
  --blue: #1a56db;
  --teal: #0f766e;
  --gold: #b7791f;
  --bg: #f4f6f9;
  --surface: #ffffff;
  --border: #dde0e8;
  --text1: #0d1f3c;
  --text2: #334155;
  --text3: #64748b;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text1);
  font-family: Inter, Arial, sans-serif;
}

.app {
  min-height: 100vh;
}

header {
  height: 64px;
}

main {
  width: min(960px, calc(100% - 32px));
  margin: 0 auto;
  padding: 42px 0 88px;
}

.module-label {
  color: var(--teal);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.module-title {
  margin: 8px 0 8px;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 0;
}

.module-subtitle {
  max-width: 560px;
  margin: 0 0 28px;
  color: var(--text3);
  font-size: 14px;
  line-height: 1.6;
}

.finance-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.finance-card {
  position: relative;
  display: grid;
  grid-template-columns: 128px minmax(0, 1fr) 26px;
  gap: 18px;
  align-items: center;
  min-height: 132px;
  padding: 22px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: inherit;
  text-decoration: none;
  box-shadow: 0 12px 34px rgba(15, 23, 42, 0.06);
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
}

.finance-card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: 8px 8px 0 0;
  background: var(--accent);
}

.finance-card:hover {
  border-color: color-mix(in srgb, var(--accent) 55%, var(--border));
  box-shadow: 0 18px 46px rgba(15, 23, 42, 0.1);
  transform: translateY(-2px);
}

.finance-logo,
.finance-arrow {
  display: grid;
  place-items: center;
  border-radius: 8px;
  background: var(--icon-bg);
  color: var(--accent);
}

.finance-logo {
  width: 128px;
  height: 72px;
  padding: 8px;
  overflow: hidden;
}

.finance-logo img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.finance-name {
  margin-bottom: 5px;
  color: var(--text1);
  font-size: 16px;
  font-weight: 800;
  line-height: 1.2;
}

.finance-desc {
  color: var(--text3);
  font-size: 13px;
  line-height: 1.5;
}

.finance-arrow {
  width: 26px;
  height: 26px;
  border-radius: 999px;
}

.finance-arrow svg {
  width: 13px;
  height: 13px;
}

.mercury {
  --accent: var(--teal);
  --icon-bg: #e6f5f3;
}

.gsa-force {
  --accent: var(--gold);
  --icon-bg: #fff7e6;
}

@media (max-width: 720px) {
  main {
    width: min(100% - 24px, 560px);
    padding-top: 28px;
  }

  .module-title {
    font-size: 26px;
  }

  .finance-grid {
    grid-template-columns: 1fr;
  }

  .finance-card {
    grid-template-columns: 96px minmax(0, 1fr) 26px;
    min-height: 116px;
    padding: 18px;
    gap: 14px;
  }

  .finance-logo {
    width: 96px;
    height: 62px;
    padding: 7px;
  }
}
</style>
<script>window.DATAFORCE_SHELL = {"title":"Finance","userNameId":"userLabel","statusText":"Ready"};</script>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-area"><a href="https://dataforce.gsaforce.com/"><img src="../dataforce-logo.png" alt="DATAFORCE"></a></div>
    <h1 class="page-title">Finance</h1>
    <div class="user-info"><span id="userLabel"></span> <button class="logout-btn" onclick="signOut()">Sign out</button></div>
  </header>

  <main>
    <div class="module-label">Finance</div>
    <h2 class="module-title">Financial Statements</h2>
    <p class="module-subtitle">Choose a finance dashboard to open the external statement workspace.</p>

    <div class="finance-grid">
      <a class="finance-card mercury" href="https://mercury-dashboard-compass.lovable.app/" target="_blank" rel="noopener noreferrer">
        <div class="finance-logo">
          <img src="../assets/mercury-logo.png" alt="Mercury Americas">
        </div>
        <div>
          <div class="finance-name">Mercury Finance</div>
          <div class="finance-desc">Mercury financial statement dashboard</div>
        </div>
        <div class="finance-arrow">
          <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5h6M5.5 2.5L8 5l-2.5 2.5"/></svg>
        </div>
      </a>

      <a class="finance-card gsa-force" href="https://gsaforce-dashboard-compass.lovable.app" target="_blank" rel="noopener noreferrer">
        <div class="finance-logo">
          <img src="../assets/gsa-force-logo.png" alt="GSA Force">
        </div>
        <div>
          <div class="finance-name">GSA Force Finance</div>
          <div class="finance-desc">GSA Force financial statement dashboard</div>
        </div>
        <div class="finance-arrow">
          <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5h6M5.5 2.5L8 5l-2.5 2.5"/></svg>
        </div>
      </a>
    </div>
  </main>
</div>

<script src="../permission-guard.js"></script>
<script src="../dataforce-shell.js"></script>
<script>
const API_BASE = "https://dataforce-api-production.up.railway.app";
const API_KEY = "We1ykcoHgFV16LPduzqw7qGJlMBPGE06U5L7y5Hg_6I";

function signOut() {
  sessionStorage.removeItem('df_user');
  sessionStorage.removeItem('df_permissions');
  window.location.href = 'https://dataforce.gsaforce.com/';
}

function initFinance() {
  const user = getDataforceUser();
  const userLabel = document.getElementById('userLabel');
  if (userLabel && user) userLabel.textContent = user.name || user.email || '';
}

checkModuleAccess('finance', initFinance);
</script>
</body>
</html>
