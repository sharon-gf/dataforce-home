<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/jpeg" href="../favicon.jpg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATAFORCE - Booking Details</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#e8eaee;
    --surface:#fff;
    --surface2:#f5f7fb;
    --surface3:#edf1f7;
    --border:#d8dde8;
    --navy:#0d1f3c;
    --navy2:#1a3360;
    --text1:#0d1f3c;
    --text2:#41536c;
    --text3:#8391a8;
    --blue:#1a56db;
    --cyan:#7aaed5;
    --teal:#0c9080;
    --amber:#c97a06;
    --red:#b91c1c;
    --green:#15803d;
    --content-width:1080px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { min-height:100%; background:var(--bg); color:var(--text1); font-family:'Inter',sans-serif; font-size:12px; }
  body { overflow-x:hidden; }
  body.filter-drawer-open { overflow:hidden; }
  button, input, select { font:inherit; }
  .app { min-height:100vh; padding:8px; }

  .header {
    background:var(--navy);
    border-radius:6px;
    padding:8px 16px;
    display:grid;
    grid-template-columns:minmax(180px,1fr) minmax(360px,1.4fr) minmax(250px,1fr);
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .logo-link { color:#fff; text-decoration:none; display:inline-flex; align-items:center; gap:9px; width:max-content; }
  .df-mark { width:28px; height:28px; border:1px solid rgba(122,174,213,.7); border-radius:4px; display:grid; place-items:center; color:#7aaed5; font-size:12px; font-weight:700; letter-spacing:0; }
  .logo-word { display:flex; flex-direction:column; gap:1px; }
  .logo-main { font-size:18px; letter-spacing:.13em; font-weight:600; line-height:1; }
  .logo-sub { color:var(--cyan); font-size:9px; letter-spacing:.24em; text-transform:uppercase; }
  .hdr-mid { text-align:center; min-width:0; }
  .header-title { color:var(--cyan); letter-spacing:.12em; font-size:17px; font-weight:500; white-space:nowrap; }
  .header-right { color:#fff; display:flex; flex-direction:column; align-items:flex-end; gap:6px; font-size:11px; min-width:0; }
  .header-actions { display:flex; align-items:center; justify-content:flex-end; gap:12px; max-width:100%; }
  .status { color:#8fb5d7; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .dot { width:7px; height:7px; border-radius:99px; background:#22c55e; }
  .logout { border:1px solid #7aaed5; color:#7aaed5; background:transparent; border-radius:3px; padding:4px 10px; cursor:pointer; font-size:10px; }
  .range { color:#8fb5d7; text-align:right; line-height:1.35; font-size:10px; }
  .range-main { color:#fff; font-size:12px; letter-spacing:.08em; font-weight:500; display:block; }

  .summary-grid { width:min(var(--content-width),100%); margin:0 auto 8px; display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:8px; }
  .kpi-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:6px;
    overflow:hidden;
    min-height:86px;
  }
  .kpi-head {
    height:30px;
    border-top:4px solid var(--teal);
    padding:5px 10px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .kpi-card.total .kpi-head { border-top-color:var(--blue); }
  .kpi-title { color:var(--text1); font-size:12px; font-weight:600; letter-spacing:.04em; }
  .biz-logo { width:30px; height:20px; border:1px solid #d5dce8; border-radius:3px; display:flex; align-items:center; justify-content:center; color:var(--text2); background:#fff; font-size:9px; font-weight:700; letter-spacing:.04em; }
  .kpi-card.total .biz-logo { color:#1a56db; border-color:#bcd1ff; }
  .kpi-body { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; padding:8px 8px 10px; }
  .kpi-body > div { text-align:center; min-width:0; }
  .metric-label { color:var(--text3); font-size:8px; text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; text-align:center; }
  .metric-value { color:var(--text1); font-size:14px; font-weight:500; line-height:1.15; white-space:nowrap; text-align:center; }
  .mobile-kpi-toggle {
    display:none;
    width:min(var(--content-width),100%);
    margin:0 auto 6px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--surface);
    color:var(--text1);
    padding:9px 12px;
    align-items:center;
    justify-content:space-between;
    font-size:10px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    cursor:pointer;
  }
  .mobile-kpi-toggle span:last-child {
    color:var(--blue);
    font-size:9px;
  }

  .panel { width:min(var(--content-width),100%); margin:0 auto; background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .panel-head {
    background:var(--navy2);
    color:#c8d8f0;
    padding:8px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    min-height:38px;
  }
  .panel-title { font-size:11px; font-weight:600; letter-spacing:.09em; text-transform:uppercase; white-space:nowrap; }
  .panel-note { font-size:10px; color:#8fb5d7; white-space:nowrap; text-align:right; min-width:0; }
  .mobile-filter-toggle {
    display:none;
    height:28px;
    border:1px solid rgba(200,216,240,.65);
    background:transparent;
    color:#fff;
    border-radius:4px;
    padding:0 10px;
    font-size:9px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    cursor:pointer;
  }

  .filters { padding:10px 12px; display:grid; grid-template-columns:minmax(150px,1fr) minmax(108px,.7fr) minmax(86px,.55fr) minmax(86px,.55fr) minmax(126px,.75fr) minmax(126px,.75fr) auto; gap:8px; align-items:end; background:var(--surface2); border-bottom:1px solid var(--border); }
  .filter-backdrop { display:none; }
  .mobile-filter-head { display:none; }
  .field { min-width:0; }
  label { display:block; font-size:9px; font-weight:600; color:var(--text2); letter-spacing:.07em; text-transform:uppercase; margin-bottom:4px; }
  input, select {
    width:100%;
    height:30px;
    border:1px solid var(--border);
    border-radius:4px;
    background:#fff;
    color:var(--text1);
    padding:5px 8px;
    outline:none;
  }
  input:focus, select:focus { border-color:#6d9ce6; box-shadow:0 0 0 2px rgba(26,86,219,.08); }
  .multi-field { position:relative; }
  .multi-select { position:relative; }
  .multi-button {
    width:100%;
    height:30px;
    border:1px solid var(--border);
    border-radius:4px;
    background:#fff;
    color:var(--text1);
    padding:5px 26px 5px 8px;
    display:flex;
    align-items:center;
    text-align:left;
    cursor:pointer;
    position:relative;
  }
  .multi-button:focus { border-color:#6d9ce6; box-shadow:0 0 0 2px rgba(26,86,219,.08); outline:none; }
  .multi-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .multi-caret {
    position:absolute;
    right:9px;
    top:50%;
    width:0;
    height:0;
    border-left:4px solid transparent;
    border-right:4px solid transparent;
    border-top:5px solid var(--text2);
    transform:translateY(-35%);
  }
  .multi-menu {
    display:none;
    position:absolute;
    z-index:12;
    top:calc(100% + 4px);
    left:0;
    width:max(100%, 138px);
    max-height:220px;
    overflow:auto;
    border:1px solid #aab5c4;
    border-radius:4px;
    background:#fff;
    box-shadow:0 12px 28px rgba(13,31,60,.18);
    padding:4px;
  }
  .multi-select.is-open .multi-menu { display:block; }
  .multi-option {
    display:flex;
    align-items:center;
    gap:7px;
    min-height:26px;
    padding:4px 6px;
    border-radius:3px;
    color:var(--text1);
    cursor:pointer;
    white-space:nowrap;
  }
  .multi-option:hover { background:#eaf0fb; }
  .multi-option input {
    width:14px;
    height:14px;
    flex:0 0 auto;
    accent-color:var(--blue);
  }
  .filter-actions { display:flex; gap:6px; align-items:end; justify-content:flex-end; }
  .tool-btn {
    height:30px;
    border:1px solid var(--border);
    background:#fff;
    color:var(--text1);
    border-radius:4px;
    padding:0 10px;
    font-size:10px;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    cursor:pointer;
    white-space:nowrap;
  }
  .tool-btn.primary { background:var(--navy); color:#fff; border-color:var(--navy); }
  .tool-btn:hover { border-color:#9aa9bd; }

  .table-shell { min-height:526px; }
  .table-wrap { overflow:auto; max-height:526px; padding:0 0 12px; }
  table { width:100%; border-collapse:collapse; }
  th { position:sticky; top:0; z-index:1; background:var(--navy2); color:#c8d8f0; font-size:9px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; padding:7px 8px; text-align:center; white-space:nowrap; }
  td { border-bottom:1px solid var(--border); padding:7px 8px; text-align:center; color:var(--text1); font-size:11px; white-space:nowrap; }
  .booking-table { width:100%; margin:0 auto; }
  tbody tr:nth-child(even) td { background:#f0f2f6; }
  tbody tr { cursor:pointer; }
  tbody tr:hover td, tbody tr.active td { background:#e4ecfb !important; }
  .awb { color:var(--blue); font-weight:600; }
  .customer { max-width:210px; overflow:hidden; text-overflow:ellipsis; }
  .empty { padding:38px 16px; color:var(--text3); text-align:center; font-size:12px; }

  .modal-backdrop { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.58); align-items:center; justify-content:center; padding:18px; }
  .modal-card { background:#fff; border-radius:8px; width:min(640px,94vw); max-height:86vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,.35); }
  .modal-head { background:var(--navy); color:#fff; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .modal-kicker { color:#8fb5d7; font-size:9px; font-weight:600; letter-spacing:.09em; text-transform:uppercase; margin-bottom:4px; }
  .modal-title { color:#fff; font-size:14px; font-weight:400; letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .modal-close { width:28px; height:28px; border:1px solid rgba(122,174,213,.5); background:transparent; color:#fff; border-radius:4px; cursor:pointer; font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .modal-close:hover { background:#17345d; }
  .modal-body { overflow:auto; padding:12px 14px; }
  .detail-head { padding:0 0 12px; border-bottom:1px solid var(--border); margin-bottom:12px; }
  .detail-kicker { color:var(--text3); font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; margin-bottom:5px; }
  .detail-awb { color:var(--text1); font-size:18px; font-weight:600; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .detail-customer { color:var(--text2); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .detail-section { margin-bottom:14px; }
  .detail-title { color:var(--text2); font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; margin-bottom:7px; }
  .kv-grid { display:flex; flex-wrap:wrap; align-items:flex-start; gap:8px; }
  .kv { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:6px 9px; min-width:96px; width:max-content; max-width:100%; }
  .booking-grid .kv:nth-child(2) { min-width:220px; max-width:360px; }
  .financial-grid { display:grid; grid-template-columns:repeat(2,122px); align-items:start; width:max-content; max-width:100%; }
  .financial-grid .kv { width:122px; min-width:122px; }
  .kv-label { color:var(--text3); font-size:8px; letter-spacing:.07em; text-transform:uppercase; margin-bottom:3px; }
  .kv-value { color:var(--text1); font-size:12px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:330px; }
  .route-line { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:9px; padding:2px 8px 12px; margin-bottom:12px; border-bottom:1px solid var(--border); }
  .route-point { min-width:0; }
  .airport { font-size:24px; font-weight:600; letter-spacing:.08em; text-align:center; }
  .route-label { color:var(--text3); font-size:8px; letter-spacing:.08em; text-transform:uppercase; text-align:center; margin-top:3px; }
  .route-center { display:flex; flex-direction:column; align-items:center; gap:7px; min-width:50px; }
  .route-mid { width:54px; height:1px; background:#9aa9bd; position:relative; }
  .route-mid::after { content:""; position:absolute; right:-1px; top:-3px; width:0; height:0; border-top:4px solid transparent; border-bottom:4px solid transparent; border-left:6px solid #9aa9bd; }
  .route-via { color:var(--text2); font-size:9px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; white-space:nowrap; }
  .segment-table th { position:static; font-size:8px; padding:6px; }
  .segment-table td { font-size:10px; padding:6px; }

  @media (max-width:1100px) {
    .header { grid-template-columns:1fr; text-align:center; }
    .logo-link { margin:auto; align-items:center; }
    .header-right { align-items:center; }
    .range { text-align:center; }
    .filters { grid-template-columns:repeat(3,minmax(0,1fr)); }
    .filter-actions { justify-content:flex-start; }
    .summary-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
  }
  @media (max-width:680px) {
    .app { padding:6px; }
    .mobile-kpi-toggle { display:flex; }
    .summary-grid.mobile-collapsed { display:none; }
    .summary-grid { grid-template-columns:1fr 1fr; }
    .metric-value { font-size:13px; }
    .panel { overflow:visible; }
    .panel-head { border-radius:6px 6px 0 0; flex-wrap:wrap; }
    .mobile-filter-toggle { display:inline-flex; align-items:center; justify-content:center; margin-left:auto; }
    .panel-head .panel-note { order:3; width:100%; margin-left:0; text-align:left; white-space:normal; line-height:1.35; }
    .filter-backdrop.is-open {
      display:block;
      position:fixed;
      inset:0;
      z-index:1090;
      background:rgba(13,31,60,.45);
    }
    .mobile-filter-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding-bottom:4px;
      border-bottom:1px solid var(--border);
    }
    .mobile-filter-title {
      color:var(--text1);
      font-size:12px;
      font-weight:600;
      letter-spacing:.09em;
      text-transform:uppercase;
    }
    .mobile-filter-close {
      width:30px;
      height:30px;
      border:1px solid var(--border);
      border-radius:4px;
      background:#fff;
      color:var(--text1);
      cursor:pointer;
      font-size:16px;
      line-height:1;
    }
    .filters {
      position:fixed;
      top:0;
      right:0;
      z-index:1100;
      width:min(88vw,360px);
      height:100vh;
      height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:10px;
      padding:14px;
      border-left:1px solid var(--border);
      border-bottom:0;
      box-shadow:-18px 0 45px rgba(13,31,60,.28);
      overflow-y:auto;
      transform:translateX(105%);
      transition:transform .2s ease;
    }
    .filters.is-open { transform:translateX(0); }
    .filter-actions { justify-content:stretch; }
    .filter-actions .tool-btn { flex:1; }
    .table-wrap { max-height:420px; }
    th, td { padding:7px 6px; }
  }
</style>

  destination: document.getElementById("destinationFilter"),
  from: document.getElementById("dateFrom"),
  to: document.getElementById("dateTo"),
  rangeTitle: document.getElementById("rangeTitle"),
  rangeDates: document.getElementById("rangeDates"),
  kpiToggle: document.getElementById("kpiToggle"),
  kpiToggleText: document.getElementById("kpiToggleText"),
  filters: document.getElementById("bookingFilters"),
  filterToggle: document.getElementById("filterToggle"),
  filterClose: document.getElementById("filterClose"),
  filterBackdrop: document.getElementById("filterBackdrop")
};

const MOBILE_QUERY = window.matchMedia("(max-width:680px)");

function user() {
  return getDataforceUser() || {};
}

function signOut() {
  sessionStorage.removeItem("df_user");
  sessionStorage.removeItem("df_permissions");
  window.location.href = "https://dataforce.gsaforce.com/";
}

function fmt(n, digits = 0) {
  return Number(n || 0).toLocaleString(undefined, {maximumFractionDigits:digits, minimumFractionDigits:digits});
}

function money(n) {
  const value = Number(n || 0);
  if (Math.abs(value) >= 1000000) return `${(value / 1000000).toFixed(1)}M`;
  if (Math.abs(value) >= 1000) return `${Math.round(value / 1000)}K`;
  return fmt(value);
}

function fullMoney(n) {
  return fmt(Number(n || 0));
}

function formatAwb(awb, pfx) {
  const raw = String(awb ?? "").trim();
  if (!raw) return "";
  const prefixDigits = String(pfx ?? "").replace(/\D/g, "");
  const parts = raw.split("-");
  const padPrefix = value => value.padStart(3, "0").slice(-3);
  const padNumber = value => value.padStart(8, "0").slice(-8);

  if (parts.length >= 2) {
    const parsedPrefix = parts[0].replace(/\D/g, "");
    const parsedNumber = parts.slice(1).join("").replace(/\D/g, "");
    if (parsedPrefix && parsedNumber) return `${padPrefix(parsedPrefix)}-${padNumber(parsedNumber)}`;
  }

  const numberDigits = raw.replace(/\D/g, "");
  if (prefixDigits && numberDigits) return `${padPrefix(prefixDigits)}-${padNumber(numberDigits)}`;
  if (numberDigits.length > 8) return `${padPrefix(numberDigits.slice(0, -8))}-${padNumber(numberDigits.slice(-8))}`;
  return raw;
}

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
  }[ch]));
}

function dateLabel(value) {
  if (!value) return "-";
  const d = new Date(`${value}T00:00:00`);
  if (Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString(undefined, {month:"short", day:"numeric", year:"numeric"});
}

function pkg(value) {
  const n = Number(value || 0);
  return n ? n.toFixed(2) : "-";
}

function kpiCard(metric) {
  const logos = { TOTAL:"DF", "MA-LOCAL":"MA", "CX-MEX":"CX", "ET-USA":"ET", "AV-CHILE":"AV" };
  const label = metric.label || metric.key || "-";
  const revenue = metric.revenue ?? metric.rev ?? 0;
  const pKg = metric.profit_per_kg ?? metric.pkg;
  return `
    <div class="kpi-card ${metric.key === "TOTAL" ? "total" : ""}">
      <div class="kpi-head">
        <div class="kpi-title">${esc(label)}</div>
        <div class="biz-logo">${esc(logos[metric.key] || label.slice(0, 2))}</div>
      </div>
      <div class="kpi-body">
        <div><div class="metric-label"># Bkgs</div><div class="metric-value">${fmt(metric.bookings)}</div></div>
        <div><div class="metric-label">Tons</div><div class="metric-value">${fmt(metric.tons, 0)}</div></div>
        <div><div class="metric-label">Rev</div><div class="metric-value">${money(revenue)}</div></div>
        <div><div class="metric-label">P/KG</div><div class="metric-value">${pkg(pKg)}</div></div>
      </div>
    </div>
  `;
}

function setStatus(text, ready) {
  document.getElementById("statusText").textContent = text;
  document.querySelector(".dot").style.background = ready ? "#22c55e" : "#c97a06";
}

function setKpisCollapsed(collapsed) {
  els.summaryGrid.classList.toggle("mobile-collapsed", collapsed);
  els.kpiToggle.setAttribute("aria-expanded", String(!collapsed));
  els.kpiToggleText.textContent = collapsed ? "Show" : "Hide";
}

function openFilterDrawer() {
  if (!MOBILE_QUERY.matches) return;
  els.filters.classList.add("is-open");
  els.filterBackdrop.classList.add("is-open");
  els.filterToggle.setAttribute("aria-expanded", "true");
  document.body.classList.add("filter-drawer-open");
}

function closeFilterDrawer() {
  els.filters.classList.remove("is-open");
  els.filterBackdrop.classList.remove("is-open");
  els.filterToggle.setAttribute("aria-expanded", "false");
  document.body.classList.remove("filter-drawer-open");
  closeMultiFilters();
}

function syncMobileControls() {
  if (!MOBILE_QUERY.matches) {
    setKpisCollapsed(false);
    closeFilterDrawer();
  }
}

function isoDate(d) {
  const copy = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
  return copy.toISOString().slice(0, 10);
}

function currentWeekDefaults() {
  const today = new Date();
  const monday = new Date(today);
  const day = (today.getDay() + 6) % 7;
  monday.setDate(today.getDate() - day);
  return { from: isoDate(monday), to: isoDate(today) };
}

function setDefaultDates() {
  const defaults = currentWeekDefaults();
  els.from.value = defaults.from;
  els.to.value = defaults.to;
}

function populateBusinessSelect(options) {
  if (businessOptionsLoaded || !Array.isArray(options) || !options.length) return;
  const current = els.business.value || "ALL";
  els.business.innerHTML = options.map(opt => `<option value="${esc(opt.key)}">${esc(opt.label)}</option>`).join("");
  els.business.value = options.some(opt => opt.key === current) ? current : "ALL";
  businessOptionsLoaded = true;
}

function multiValues(root) {
  const value = root.dataset.value;
  if (value === undefined) return ["ALL"];
  return String(value).split(",").filter(Boolean);
}

function multiOptionValues(root) {
  return [...root.querySelectorAll('input[type="checkbox"]')]
    .map(input => input.value)
    .filter(value => value !== "ALL");
}

function normalizedMultiValues(root) {
  const concrete = multiValues(root).filter(value => value !== "ALL");
  if (concrete.length) return concrete;
  return multiValues(root).includes("ALL") ? ["ALL"] : [];
}

function setMultiValues(root, values) {
  const raw = values || [];
  const concrete = raw.filter(value => value && value !== "ALL");
  root.dataset.value = concrete.length ? concrete.join(",") : (raw.includes("ALL") ? "ALL" : "");
  updateMultiFilter(root);
}

function validMultiValues(root, options) {
  const valid = normalizedMultiValues(root).filter(value => value === "ALL" || options.includes(value));
  const concrete = valid.filter(value => value !== "ALL");
  if (concrete.length) return concrete;
  return valid.includes("ALL") ? ["ALL"] : [];
}

function multiFilterValue(root) {
  const concrete = normalizedMultiValues(root).filter(value => value !== "ALL");
  const selected = new Set(concrete);
  const options = multiOptionValues(root);
  if (normalizedMultiValues(root).includes("ALL") || (options.length > 0 && options.every(value => selected.has(value)))) {
    return "ALL";
  }
  return concrete.length ? concrete.join(",") : "__NONE__";
}

function updateMultiFilter(root) {
  const values = normalizedMultiValues(root);
  const options = multiOptionValues(root);
  const text = root.querySelector(".multi-text");
  const selected = new Set(values);
  const allSelected = selected.has("ALL") || (options.length > 0 && options.every(value => selected.has(value)));
  text.textContent = allSelected
    ? "All"
    : values.length === 0
      ? "None"
      : values.length <= 2
        ? values.join(", ")
        : `${values.length} selected`;
  root.querySelectorAll('input[type="checkbox"]').forEach(input => {
    input.checked = input.value === "ALL" ? allSelected : allSelected || selected.has(input.value);
  });
}

function renderMultiFilter(root, options) {
  const current = validMultiValues(root, options);
  const menu = root.querySelector(".multi-menu");
  const allOptions = ["ALL"].concat(options);
  menu.innerHTML = allOptions.map(value => `
    <label class="multi-option">
      <input type="checkbox" value="${esc(value)}">
      <span>${esc(value === "ALL" ? "All" : value)}</span>
    </label>
  `).join("");
  menu.querySelectorAll('input[type="checkbox"]').forEach(input => {
    input.addEventListener("change", () => {
      if (input.value === "ALL") {
        setMultiValues(root, input.checked ? options : []);
      } else {
        const selected = [...menu.querySelectorAll('input[type="checkbox"]:checked')]
          .map(item => item.value)
          .filter(value => value !== "ALL");
        setMultiValues(root, selected);
      }
      loadBookings();
    });
  });
  setMultiValues(root, current);
}

function closeMultiFilters(except = null) {
  document.querySelectorAll(".multi-select.is-open").forEach(root => {
    if (root === except) return;
    root.classList.remove("is-open");
    root.querySelector(".multi-button").setAttribute("aria-expanded", "false");
  });
}

function toggleMultiFilter(root) {
  const open = !root.classList.contains("is-open");
  closeMultiFilters(root);
  root.classList.toggle("is-open", open);
  root.querySelector(".multi-button").setAttribute("aria-expanded", String(open));
}

function populateOriginFilter(rows) {
  rows.forEach(row => {
    if (row.ori) knownOrigins.add(String(row.ori));
  });
  const origins = [...knownOrigins].sort();
  renderMultiFilter(els.origin, origins);
}

function populateDestinationFilter(rows) {
  rows.forEach(row => {
    if (row.des) knownDestinations.add(String(row.des));
  });
  const destinations = [...knownDestinations].sort();
  renderMultiFilter(els.destination, destinations);
}

function renderSummary() {
  els.summaryGrid.innerHTML = ((currentData && currentData.fixedCards) || []).map(kpiCard).join("");
}

function filteredTotals() {
  const summary = (currentData && currentData.summary) || {};
  const fallback = bookingRows.reduce((totals, row) => {
    totals.bookings += 1;
    totals.chw += Number(row.chw || 0);
    totals.rev += Number(row.rev || 0);
    return totals;
  }, {bookings:0, chw:0, rev:0});
  return {
    bookings: summary.bookings ?? fallback.bookings,
    chw: summary.chw ?? fallback.chw,
    rev: summary.rev ?? fallback.rev
  };
}

function renderTable() {
  const totals = filteredTotals();
  els.resultNote.textContent = `${fmt(totals.bookings)} bookings | ${fmt(totals.chw)} kg | $${fullMoney(totals.rev)} rev`;
  if (!bookingRows.length) {
    els.body.innerHTML = '<tr><td colspan="11" class="empty">No bookings match this filter.</td></tr>';
    return;
  }
  els.body.innerHTML = bookingRows.map((row, index) => `
    <tr data-index="${index}">
      <td>${dateLabel(row.booked_date)}</td>
      <td class="awb">${esc(formatAwb(row.awb_no || row.awb, row.pfx))}</td>
      <td>${esc(row.business)}</td>
      <td class="customer" title="${esc(row.customer)}">${esc(row.customer)}</td>
      <td>${esc(row.ori)}</td>
      <td>${esc(row.des)}</td>
      <td>${esc(row.via)}</td>
      <td>${fmt(row.chw)}</td>
      <td>$${fullMoney(row.rev)}</td>
      <td>$${pkg(row.sales_per_kg ?? (row.chw ? row.rev / row.chw : 0))}</td>
      <td>${pkg(row.pkg)}</td>
    </tr>
  `).join("");
  els.body.querySelectorAll("tr[data-index]").forEach(tr => {
    tr.addEventListener("click", () => {
      openBookingModal(bookingRows[Number(tr.dataset.index)]);
    });
  });
}

function render() {
  renderSummary();
  renderTable();
}

async function loadBookings() {
  const u = user();
  const seq = ++requestSeq;
  setStatus("Loading", false);
  els.body.innerHTML = '<tr><td colspan="11" class="empty">Loading bookings...</td></tr>';

  const params = new URLSearchParams({
    email: u.email || "",
    biz: els.business.value || "ALL",
    date_from: els.from.value || "",
    date_to: els.to.value || "",
    search: els.search.value.trim(),
    origin: multiFilterValue(els.origin),
    destination: multiFilterValue(els.destination),
    limit: "500"
  });

  try {
    const response = await fetch(`${API_BASE}/api/booking_details?${params.toString()}`, {
      headers: { "x-api-key": API_KEY }
    });
    if (!response.ok) {
      let detail = "";
      try {
        const body = await response.json();
        detail = body.detail ? `: ${body.detail}` : "";
      } catch (_) {}
      throw new Error(`API error ${response.status}${detail}`);
    }
    const data = await response.json();
    if (seq !== requestSeq) return;
    currentData = data;
    bookingRows = data.rows || [];
    populateBusinessSelect(data.businessOptions || []);
    populateOriginFilter(bookingRows);
    populateDestinationFilter(bookingRows);
    els.rangeTitle.textContent = "BOOKED THIS WEEK";
    els.rangeDates.textContent = `${dateLabel(data.date_from)} - ${dateLabel(data.date_to)}`;
    render();
    setStatus("Ready", true);
  } catch (e) {
    if (seq !== requestSeq) return;
    console.error("Failed to load Booking Details:", e);
    setStatus("Error", false);
    els.body.innerHTML = `<tr><td colspan="11" class="empty">Could not load bookings. ${esc(e.message || "")}</td></tr>`;
  }
}

function debouncedLoad() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadBookings, 250);
}

function openBookingModal(row) {
  selectedRow = row;
  renderDetail(row, null);
  els.modal.style.display = "flex";
  loadSegments(row);
}

function closeBookingModal() {
  els.modal.style.display = "none";
}

async function loadSegments(row) {
  if (!row) return;
  const u = user();
  const params = new URLSearchParams({
    email: u.email || "",
    pfx: row.pfx || "",
    awb: row.awb_no || "",
    biz: els.business.value || "ALL"
  });
  try {
    const response = await fetch(`${API_BASE}/api/booking_details_segments?${params.toString()}`, {
      headers: { "x-api-key": API_KEY }
    });
    if (!response.ok) throw new Error(`API error ${response.status}`);
    const data = await response.json();
    renderDetail(row, data.rows || []);
  } catch (e) {
    console.error("Failed to load segments:", e);
    renderDetail(row, [], "Could not load segment detail.");
  }
}

function renderDetail(row, segments, segmentError = "") {
  if (!row) {
    els.modalTitle.textContent = "AWB Detail";
    els.modalBody.innerHTML = '<div class="empty">Select a booking.</div>';
    return;
  }
  const profit = Number(row.profit || 0);
  const salesRateKg = row.sales_per_kg ?? (row.chw ? row.rev / row.chw : 0);
  const displayAwb = formatAwb(row.awb_no || row.awb, row.pfx);
  els.modalTitle.textContent = `${displayAwb} - ${row.customer}`;
  const segmentRows = Array.isArray(segments) ? segments.map(seg => `
    <tr>
      <td>${esc(seg.carrier)}</td>
      <td>${esc(seg.flight)}</td>
      <td>${dateLabel(seg.flight_date)}</td>
      <td>${esc(seg.ori)}</td>
      <td>${esc(seg.des)}</td>
      <td>${esc(seg.status)}</td>
      <td>$${fullMoney(seg.cost)}</td>
      <td>${pkg(seg.cost_kg)}</td>
    </tr>
  `).join("") : "";
  const segmentBody = segmentError
    ? `<tr><td colspan="8" class="empty">${esc(segmentError)}</td></tr>`
    : segments === null
      ? '<tr><td colspan="8" class="empty">Loading segments...</td></tr>'
      : (segmentRows || '<tr><td colspan="8" class="empty">No segments found.</td></tr>');
  els.modalBody.innerHTML = `
    <div class="detail-head">
      <div class="detail-kicker">Booking summary</div>
      <div class="detail-awb">${esc(displayAwb)}</div>
    </div>
    <div class="detail-body">
      <div class="route-line">
        <div class="route-point">
          <div class="airport">${esc(row.ori)}</div>
          <div class="route-label">Origin</div>
        </div>
        <div class="route-center">
          <div class="route-mid"></div>
          <div class="route-via">via ${esc(row.via || "-")}</div>
        </div>
        <div class="route-point">
          <div class="airport">${esc(row.des)}</div>
          <div class="route-label">Destination</div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-title">Booking</div>
        <div class="kv-grid booking-grid">
          <div class="kv"><div class="kv-label">Business</div><div class="kv-value">${esc(row.business)}</div></div>
          <div class="kv"><div class="kv-label">Customer</div><div class="kv-value">${esc(row.customer)}</div></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-title">Cargo</div>
        <div class="kv-grid cargo-grid">
          <div class="kv"><div class="kv-label">Commodity</div><div class="kv-value">${esc(row.commodity)}</div></div>
          <div class="kv"><div class="kv-label">Product</div><div class="kv-value">${esc(row.product)}</div></div>
          <div class="kv"><div class="kv-label">CHW</div><div class="kv-value">${fmt(row.chw)} kg</div></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-title">Financials</div>
        <div class="kv-grid financial-grid">
          <div class="kv"><div class="kv-label">Sales/KG</div><div class="kv-value">$${pkg(salesRateKg)}</div></div>
          <div class="kv"><div class="kv-label">Profit/KG</div><div class="kv-value">$${pkg(row.pkg)}</div></div>
          <div class="kv"><div class="kv-label">Sales Revenue</div><div class="kv-value">$${fullMoney(row.rev)}</div></div>
          <div class="kv"><div class="kv-label">Profit</div><div class="kv-value">$${fullMoney(profit)}</div></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-title">Segments</div>
        <table class="segment-table">
          <thead><tr><th>Carrier</th><th>Flight</th><th>Flight Date</th><th>Ori</th><th>Des</th><th>Status</th><th>Cost</th><th>Cost/KG</th></tr></thead>
          <tbody>${segmentBody}</tbody>
        </table>
      </div>
    </div>
  `;
}

document.addEventListener("keydown", event => {
  if (event.key === "Escape") {
    closeBookingModal();
    closeFilterDrawer();
    closeMultiFilters();
  }
});
document.addEventListener("click", event => {
  if (!event.target.closest(".multi-select")) closeMultiFilters();
});

els.kpiToggle.addEventListener("click", () => {
  setKpisCollapsed(!els.summaryGrid.classList.contains("mobile-collapsed"));
});
els.filterToggle.addEventListener("click", () => {
  if (els.filters.classList.contains("is-open")) closeFilterDrawer();
  else openFilterDrawer();
});
els.filterClose.addEventListener("click", closeFilterDrawer);
els.filterBackdrop.addEventListener("click", closeFilterDrawer);
if (MOBILE_QUERY.addEventListener) {
  MOBILE_QUERY.addEventListener("change", syncMobileControls);
} else {
  MOBILE_QUERY.addListener(syncMobileControls);
}
syncMobileControls();

els.search.addEventListener("input", debouncedLoad);
[els.business, els.from, els.to].forEach(el => el.addEventListener("input", loadBookings));
[els.origin, els.destination].forEach(root => {
  root.querySelector(".multi-button").addEventListener("click", event => {
    event.stopPropagation();
    toggleMultiFilter(root);
  });
});
document.getElementById("resetBtn").addEventListener("click", () => {
  els.search.value = "";
  els.business.value = "ALL";
  setMultiValues(els.origin, ["ALL"]);
  setMultiValues(els.destination, ["ALL"]);
  setDefaultDates();
  loadBookings();
  closeFilterDrawer();
});
document.getElementById("exportBtn").addEventListener("click", () => {
  const csv = ["Booked,AWB,Business,Customer,Origin,Destination,Via,CHW,Revenue,SalesPerKG,ProfitPerKG"]
    .concat(bookingRows.map(r => [r.booked_date, formatAwb(r.awb_no || r.awb, r.pfx), r.business, r.customer, r.ori, r.des, r.via, r.chw, r.rev, r.sales_per_kg ?? (r.chw ? r.rev / r.chw : ""), r.pkg].map(v => `"${String(v ?? "").replace(/"/g, '""')}"`).join(",")))
    .join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "booking-details.csv";
  a.click();
  URL.revokeObjectURL(url);
});

function initBookingDetails() {
  const u = user();
  document.getElementById("userLabel").textContent = u.name || u.email || "";
  setDefaultDates();
  loadBookings();
}

checkModuleAccess("booking_details", initBookingDetails);
</script>
</body>
</html>
