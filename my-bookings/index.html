<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATAFORCE - My Bookings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#e8eaee;
    --surface:#fff;
    --surface2:#f5f7fb;
    --border:#d8dde8;
    --navy:#0d1f3c;
    --navy2:#1a3360;
    --text1:#0d1f3c;
    --text2:#41536c;
    --text3:#8391a8;
    --blue:#1a56db;
    --teal:#0c9080;
    --amber:#c97a06;
    --red:#b91c1c;
    --green:#15803d;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { min-height:100%; background:var(--bg); color:var(--text1); font-family:'Inter',sans-serif; font-size:12px; }
  body { overflow-x:hidden; }
  .app { min-height:100vh; padding:8px; }
  .header {
    background:var(--navy);
    border-radius:6px;
    padding:8px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .logo { display:flex; align-items:center; gap:8px; min-width:180px; }
  .logo a { display:flex; align-items:center; cursor:pointer; }
  .logo img { height:28px; width:auto; object-fit:contain; display:block; }
  .hdr-mid-section { flex:1; text-align:center; min-width:0; }
  .header-title { text-align:center; color:#7aaed5; letter-spacing:.12em; font-size:17px; font-weight:500; white-space:nowrap; margin-bottom:6px; }
  .header-controls { display:flex; flex-direction:column; justify-content:center; align-items:center; gap:7px; }
  .header-right { min-width:260px; display:flex; flex-direction:column; justify-content:center; align-items:flex-end; gap:5px; color:#fff; font-size:11px; }
  .header-actions { display:flex; justify-content:flex-end; align-items:center; gap:12px; }
  .status { color:#8fb5d7; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .dot { width:7px; height:7px; border-radius:999px; background:#c97a06; }
  .dot.ready { background:#22c55e; }
  .logout { border:1px solid #7aaed5; color:#7aaed5; background:transparent; border-radius:3px; padding:4px 10px; cursor:pointer; font:inherit; font-size:10px; }

  .periods { display:flex; gap:8px; justify-content:center; }
  .period-btn {
    border:1px solid rgba(122,174,213,.45);
    background:#102847;
    color:#9abfe0;
    border-radius:4px;
    padding:4px 15px;
    font-size:10px;
    font-weight:600;
    letter-spacing:.08em;
    cursor:pointer;
    white-space:nowrap;
  }
  .period-btn.active { background:var(--blue); color:#fff; border-color:#5e9bff; }
  .range { color:#8fb5d7; text-align:right; line-height:1.35; min-width:152px; font-size:10px; }
  .range-main { color:#fff; font-size:12px; letter-spacing:.08em; font-weight:500; display:block; }
  .filters { display:flex; align-items:center; gap:8px; }
  .filters label { color:#8fb5d7; font-size:10px; text-transform:uppercase; letter-spacing:.08em; }
  select {
    min-width:150px;
    height:25px;
    border:1px solid #45658d;
    background:#102847;
    color:#fff;
    border-radius:5px;
    padding:3px 9px;
    font-size:10px;
    line-height:1;
    outline:none;
  }

  .fixed-grid {
    display:grid;
    grid-template-columns:repeat(5,minmax(0,1fr));
    gap:8px;
    margin-bottom:8px;
  }
  .kpi-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:6px;
    overflow:hidden;
    min-height:86px;
  }
  .kpi-head {
    height:30px;
    border-top:4px solid var(--teal);
    padding:5px 10px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .kpi-card.total .kpi-head { border-top-color:var(--blue); }
  .kpi-title { color:var(--text1); font-size:12px; font-weight:600; letter-spacing:.04em; }
  .biz-logo { height:20px; max-width:54px; object-fit:contain; display:block; }
  .kpi-sub { display:none; }
  .kpi-body { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; padding:8px 8px 10px; }
  .kpi-body > div { text-align:center; min-width:0; }
  .metric-label { color:var(--text3); font-size:8px; text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; text-align:center; }
  .metric-value { color:var(--text1); font-size:14px; font-weight:500; line-height:1.15; white-space:nowrap; text-align:center; }

  .content-grid { display:grid; grid-template-columns:minmax(0,1.15fr) minmax(360px,.85fr); gap:8px; margin-bottom:8px; }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; min-height:260px; }
  .panel-head {
    background:var(--navy2);
    color:#c8d8f0;
    padding:8px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    min-height:38px;
  }
  .panel-title { font-size:11px; font-weight:600; letter-spacing:.09em; text-transform:uppercase; }
  .panel-note { font-size:10px; color:#8fb5d7; white-space:nowrap; }
  .trend { padding:6px 10px 8px; min-height:342px; }
  .chart-wrap { position:relative; width:100%; height:314px; }
  .trend-legend { display:flex; justify-content:flex-end; align-items:center; gap:14px; color:var(--text2); font-size:10px; margin-bottom:2px; }
  .legend-item { display:flex; align-items:center; gap:5px; }
  .legend-swatch { width:18px; height:3px; border-radius:99px; background:#1a56db; }
  .legend-swatch.prev { background:#ef4444; }

  table { width:100%; border-collapse:collapse; }
  th { background:var(--navy2); color:#c8d8f0; font-size:9px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; padding:7px 8px; text-align:right; white-space:nowrap; }
  th:first-child, td:first-child { text-align:left; }
  td { border-bottom:1px solid var(--border); padding:7px 8px; text-align:right; color:var(--text1); font-size:11px; white-space:nowrap; }
  tbody tr:nth-child(even) td { background:#f0f2f6; }
  .clickable-row { cursor:pointer; }
  .clickable-row:hover td { background:#e4ecfb !important; }
  .table-scroll { max-height:270px; overflow:auto; }
  .recent-panel { min-height:360px; }
  .recent-panel .table-scroll { max-height:322px; overflow:hidden; }
  .customer-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
  .customer-panel { min-height:368px; }
  .customer-panel .table-scroll { max-height:330px; }
  .empty { padding:34px 16px; color:var(--text3); text-align:center; font-size:12px; }
  .loading { padding:42px 16px; text-align:center; color:var(--text3); }
  .error { background:#fff5f5; border:1px solid #fecaca; color:#991b1b; border-radius:6px; padding:12px; margin-bottom:8px; display:none; }
  .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:1000; align-items:center; justify-content:center; padding:18px; }
  .modal-card { background:#fff; border-radius:8px; width:min(980px,96vw); max-height:82vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.35); }
  .modal-head { background:var(--navy); color:#fff; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .modal-title { color:#fff; font-size:13px; font-weight:500; letter-spacing:.04em; }
  .modal-close { background:transparent; border:0; color:#fff; cursor:pointer; font-size:18px; line-height:1; padding:0 4px; }
  .modal-body { overflow:auto; flex:1; }
  .modal-table th { position:sticky; top:0; z-index:1; }
  .modal-table td { font-size:11px; }
  .modal-footer { padding:8px 16px; background:#f5f7fb; color:var(--text2); border-top:1px solid var(--border); font-size:11px; }

  @media (max-width:980px) {
    .header { flex-wrap:wrap; padding:10px 12px; }
    .logo { order:1; flex:1 1 45%; min-width:0; }
    .logo img { height:30px; }
    .header-right { order:2; flex:1 1 45%; min-width:0; }
    .header-actions { flex-wrap:wrap; row-gap:5px; }
    .hdr-mid-section { order:3; flex:1 1 100%; margin-top:10px; }
    .periods, .filters { justify-content:center; }
    .fixed-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .content-grid { grid-template-columns:1fr; }
    .customer-grid { grid-template-columns:1fr; }
  }
  @media (max-width:560px) {
    .fixed-grid { grid-template-columns:1fr; }
    .header-controls, .periods, .filters { width:100%; justify-content:center; flex-wrap:wrap; }
    .header-right { justify-content:center; align-items:center; flex-wrap:wrap; }
    .header-actions { justify-content:center; }
    .range { text-align:center; }
    select { width:100%; }
    .bar-row { grid-template-columns:54px 1fr 62px; }
    .header-title { font-size:15px; }
  }
</style>

function user() {
  try { return JSON.parse(sessionStorage.getItem("df_user") || "{}"); }
  catch (e) { return {}; }
}

function permissions() {
  try { return JSON.parse(sessionStorage.getItem("df_permissions") || "{}"); }
  catch (e) { return {}; }
}

function signOut() {
  sessionStorage.removeItem("df_user");
  sessionStorage.removeItem("df_permissions");
  window.location.href = "https://dataforce.gsaforce.com/";
}

function num(value, digits = 0) {
  const n = Number(value || 0);
  return n.toLocaleString(undefined, { maximumFractionDigits: digits, minimumFractionDigits: digits });
}

function money(value) {
  const n = Number(value || 0);
  return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
}

function shortMoney(value) {
  const n = Number(value || 0);
  const abs = Math.abs(n);
  if (abs >= 1000000) return `${(n / 1000000).toFixed(abs >= 10000000 ? 0 : 1)}M`;
  if (abs >= 1000) return `${Math.round(n / 1000)}K`;
  return money(n);
}

function pkg(value) {
  const n = Number(value || 0);
  return n ? n.toFixed(2) : "-";
}

function shortCustomer(value) {
  const text = String(value || "-");
  return text.length > 24 ? `${text.slice(0, 21)}...` : text;
}

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[ch]));
}

function formatDate(value) {
  if (!value) return "-";
  const d = new Date(`${value}T00:00:00`);
  return d.toLocaleDateString(undefined, { month:"short", day:"numeric", year:"numeric" });
}

function cardMetric(metric, label) {
  const titleClass = metric.key === "ALL" ? "kpi-card total" : "kpi-card";
  const cfg = BUSINESS_OPTIONS.find(opt => opt.key === metric.key) || {};
  return `
    <div class="${titleClass}">
      <div class="kpi-head">
        <div>
          <div class="kpi-title">${label || metric.label || metric.key}</div>
        </div>
        ${cfg.logo ? `<img class="biz-logo" src="${cfg.logo}" alt="${cfg.label || metric.label || metric.key}">` : ""}
      </div>
      <div class="kpi-body">
        <div><div class="metric-label"># Bkgs</div><div class="metric-value">${num(metric.bookings)}</div></div>
        <div><div class="metric-label">Tons</div><div class="metric-value">${num(metric.tons, 0)}</div></div>
        <div><div class="metric-label">Rev</div><div class="metric-value">${shortMoney(metric.revenue)}</div></div>
        <div><div class="metric-label">P/KG</div><div class="metric-value">${pkg(metric.profit_per_kg)}</div></div>
      </div>
    </div>
  `;
}

function renderFixedCards() {
  document.getElementById("fixedCards").innerHTML = (currentData.fixedCards || []).map(card => cardMetric(card)).join("");
}

function renderTrend() {
  const rows = currentData.trend || [];
  const prevRows = currentData.trendPrev || [];
  const allRows = rows.concat(prevRows);
  const max = Math.max(...allRows.map(r => Number(r.tons || 0)), 0);
  const box = document.getElementById("trendBox");
  if (!rows.length || max <= 0) {
    if (trendChart) {
      trendChart.destroy();
      trendChart = null;
    }
    box.innerHTML = '<div class="empty">No trend data for this selection.</div>';
    return;
  }
  const weekly = rows.some(r => Number(r.period_week || 0) > 0) || prevRows.some(r => Number(r.period_week || 0) > 0);
  const labels = weekly ? Array.from({ length:52 }, (_, i) => `W${i + 1}`) : rows.map(r => r.period_label || "");
  const toSeries = source => {
    if (!weekly) return source.map(r => Number(r.tons || 0));
    const values = Array(52).fill(null);
    source.forEach(r => {
      const week = Number(r.period_week || 0);
      if (week >= 1 && week <= 52) values[week - 1] = Number(r.tons || 0);
    });
    return values;
  };
  box.innerHTML = `
    <div class="trend-legend">
      <span class="legend-item"><span class="legend-swatch"></span>2026</span>
      ${prevRows.length ? '<span class="legend-item"><span class="legend-swatch prev"></span>2025</span>' : ''}
    </div>
    <div class="chart-wrap"><canvas id="myBookingsTrendChart"></canvas></div>
  `;
  const ctx = document.getElementById("myBookingsTrendChart").getContext("2d");
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type:"line",
    data:{
      labels,
      datasets:[
        {label:"2026", data:toSeries(rows), borderColor:"#4a8eff", borderWidth:1.5, pointRadius:1, pointHoverRadius:5, tension:0.3, fill:false, spanGaps:false},
        ...(prevRows.length ? [{label:"2025", data:toSeries(prevRows), borderColor:"#e05555", borderWidth:1.5, pointRadius:1, pointHoverRadius:4, tension:0.3, fill:false, spanGaps:false}] : [])
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:"index", intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:"#0d1f3c", borderColor:"#243a5c", borderWidth:1, titleColor:"#7aaae8", bodyColor:"#d8e4f4", padding:8}
      },
      scales:{
        x:{grid:{color:"rgba(0,0,0,0.05)"}, ticks:{color:"#8896aa", font:{size:8}, maxRotation:45, autoSkip:!weekly}},
        y:{grid:{color:"rgba(0,0,0,0.05)"}, ticks:{color:"#8896aa", font:{size:8}}, beginAtZero:true}
      }
    }
  });
}

function renderDetail() {
  const body = document.getElementById("detailBody");
  const rows = currentData.detail || [];
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="5" class="empty">No business detail for this selection.</td></tr>';
    return;
  }
  body.innerHTML = rows.map(r => `
    <tr class="clickable-row" data-detail-scope="period" data-period-year="${esc(r.period_year)}" data-period-week="${esc(r.period_week)}" data-label="${esc(r.period_label || r.week || "-")}">
      <td>${esc(r.name || r.period_label || r.week || "-")}</td>
      <td>${num(r.bookings)}</td>
      <td>${num(r.tons, 2)}</td>
      <td>${shortMoney(r.revenue || r.rev)}</td>
      <td>${pkg(r.profit_per_kg || r.pkg)}</td>
    </tr>
  `).join("");
  body.querySelectorAll(".clickable-row").forEach(row => {
    row.addEventListener("click", () => showAwbDetail({
      scope: "period",
      periodYear: row.dataset.periodYear,
      periodWeek: row.dataset.periodWeek,
      title: `AWB Detail - ${row.dataset.label}`
    }));
  });
}

function renderCustomers() {
  const top = ((currentData.customers && currentData.customers.top) || []).slice(0, 10);
  const growing = ((currentData.customers && currentData.customers.growing) || []).slice(0, 10);
  const dropping = ((currentData.customers && currentData.customers.dropping) || []).slice(0, 10);

  document.getElementById("topCustomersTable").innerHTML = `
    <thead><tr><th>Customer</th><th>Tons</th><th>Rev</th><th>SOW</th></tr></thead>
    <tbody>${top.length ? top.map(c => `
      <tr class="clickable-row" data-detail-scope="customer" data-customer="${esc(c.customer)}">
        <td title="${esc(c.customer)}">${esc(shortCustomer(c.customer))}</td>
        <td>${num(c.tons, 2)}</td>
        <td>${shortMoney(c.revenue)}</td>
        <td>${num(c.share, 1)}%</td>
      </tr>
    `).join("") : '<tr><td colspan="4" class="empty">No customer data.</td></tr>'}</tbody>
  `;

  const movementRows = rows => rows.map(c => `
    <tr class="clickable-row" data-detail-scope="customer_recent10" data-customer="${esc(c.customer)}">
      <td title="${esc(c.customer)}">${esc(shortCustomer(c.customer))}</td>
      <td>${num(c.prior_avg_tons, 2)}</td>
      <td>${num(c.recent_avg_tons, 2)}</td>
      <td>${num(c.change_tons, 2)}</td>
    </tr>
  `).join("");

  document.getElementById("growingCustomersTable").innerHTML = `
    <thead><tr><th>Customer</th><th>Prior</th><th>Recent</th><th>+/-</th></tr></thead>
    <tbody>${growing.length ? movementRows(growing) : '<tr><td colspan="4" class="empty">No growing customers.</td></tr>'}</tbody>
  `;

  document.getElementById("droppingCustomersTable").innerHTML = `
    <thead><tr><th>Customer</th><th>Prior</th><th>Recent</th><th>+/-</th></tr></thead>
    <tbody>${dropping.length ? movementRows(dropping) : '<tr><td colspan="4" class="empty">No dropping customers.</td></tr>'}</tbody>
  `;
  document.querySelectorAll("#topCustomersTable .clickable-row, #growingCustomersTable .clickable-row, #droppingCustomersTable .clickable-row").forEach(row => {
    row.addEventListener("click", () => showAwbDetail({
      scope: row.dataset.detailScope,
      customer: row.dataset.customer,
      title: `AWB Detail - ${row.dataset.customer}`
    }));
  });
}

function closeAwbModal() {
  document.getElementById("awbModal").style.display = "none";
}

document.getElementById("awbModal").addEventListener("click", e => {
  if (e.target.id === "awbModal") closeAwbModal();
});

async function showAwbDetail({scope, periodYear, periodWeek, customer, title}) {
  const modal = document.getElementById("awbModal");
  const body = document.getElementById("awbModalBody");
  const footer = document.getElementById("awbModalFooter");
  const biz = document.getElementById("bizSelect").value || "ALL";
  const u = user();
  document.getElementById("awbModalTitle").textContent = title || "AWB Detail";
  body.innerHTML = '<tr><td colspan="10" class="empty">Loading...</td></tr>';
  footer.textContent = "";
  modal.style.display = "flex";

  const params = new URLSearchParams({
    mode: currentMode,
    biz,
    email: u.email || "",
    scope: scope || "period"
  });
  if (periodYear) params.set("period_year", periodYear);
  if (periodWeek) params.set("period_week", periodWeek);
  if (customer) params.set("customer", customer);

  try {
    const r = await fetch(`${API_BASE}/api/my_bookings_detail?${params.toString()}`, { headers:{ "x-api-key":API_KEY } });
    if (!r.ok) throw new Error(`API error ${r.status}`);
    const data = await r.json();
    const rows = data.rows || [];
    if (!rows.length) {
      body.innerHTML = '<tr><td colspan="10" class="empty">No AWBs found.</td></tr>';
      return;
    }
    body.innerHTML = rows.map(row => `
      <tr>
        <td>${esc(row.pfx || "-")}</td>
        <td>${esc(row.awb || "-")}</td>
        <td>${esc(row.ori || "-")}</td>
        <td>${esc(row.des || "-")}</td>
        <td>${esc(row.flight_date || "-")}</td>
        <td>${esc(row.booked_date || "-")}</td>
        <td title="${esc(row.customer || "")}">${esc(shortCustomer(row.customer))}</td>
        <td>${num(row.chw, 0)}</td>
        <td>${shortMoney(row.rev)}</td>
        <td>${pkg(row.pkg)}</td>
      </tr>
    `).join("");
    const totalKgs = rows.reduce((sum, row) => sum + Number(row.chw || 0), 0);
    const totalRev = rows.reduce((sum, row) => sum + Number(row.rev || 0), 0);
    footer.textContent = `${rows.length} AWBs - Total ${num(totalKgs, 0)} kgs / ${shortMoney(totalRev)} rev`;
  } catch (e) {
    console.error("Failed to load AWB detail:", e);
    body.innerHTML = '<tr><td colspan="10" class="empty">Error loading AWB detail.</td></tr>';
  }
}

function renderAll() {
  const modeLabel = currentMode === "ytd_flown" ? "YTD FLOWN" : "THIS WEEK BOOKED";
  const bizLabel = BUSINESS_OPTIONS.find(b => b.key === document.getElementById("bizSelect").value)?.label || "ALL";
  const p = permissions();
  document.getElementById("rangeTitle").textContent = modeLabel;
  document.getElementById("rangeDates").textContent = `${formatDate(currentData.start)} - ${formatDate(currentData.end)}`;
  document.getElementById("selectedTitle").textContent = `${bizLabel} Trend`;
  document.getElementById("salesPersonLabel").textContent = p.sales_person ? `Sales person ${p.sales_person}` : "All sales persons";
  document.getElementById("detailNote").textContent = currentMode === "ytd_flown" ? "By flight date" : "By booking date";
  renderFixedCards();
  renderTrend();
  renderDetail();
  renderCustomers();
}

function setStatus(text, ready) {
  document.getElementById("statusText").textContent = text;
  document.getElementById("statusDot").classList.toggle("ready", Boolean(ready));
}

function showError(message) {
  const box = document.getElementById("errorBox");
  box.textContent = message;
  box.style.display = message ? "block" : "none";
}

async function loadReport() {
  const u = user();
  const biz = document.getElementById("bizSelect").value || "ALL";
  const cacheKey = `${currentMode}|${biz}|${u.email || ""}`;
  const seq = ++requestSeq;
  if (reportCache.has(cacheKey)) {
    currentData = reportCache.get(cacheKey);
    renderAll();
    setStatus("Ready", true);
    showError(currentData.errors && currentData.errors.length ? currentData.errors.join(" · ") : "");
    return;
  }
  setStatus("Loading reports", false);
  showError("");
  try {
    const url = `${API_BASE}/api/my_bookings?mode=${encodeURIComponent(currentMode)}&biz=${encodeURIComponent(biz)}&email=${encodeURIComponent(u.email || "")}`;
    const r = await fetch(url, { headers:{ "x-api-key":API_KEY } });
    if (!r.ok) {
      let detail = "";
      try {
        const body = await r.json();
        detail = body.detail ? `: ${body.detail}` : "";
      } catch (_) {}
      throw new Error(`API error ${r.status}${detail}`);
    }
    const data = await r.json();
    if (seq !== requestSeq) return;
    currentData = data;
    reportCache.set(cacheKey, data);
    renderAll();
    if (currentData.errors && currentData.errors.length) {
      showError(currentData.errors.join(" · "));
    }
    setStatus("Ready", true);
  } catch (e) {
    if (seq !== requestSeq) return;
    console.error("Failed to load My Bookings:", e);
    setStatus("Error", false);
    showError(`Could not load My Bookings. ${e.message || "Please refresh or contact an administrator."}`);
  }
}

function populateBusinessSelect() {
  const select = document.getElementById("bizSelect");
  const p = permissions();
  const allowed = Array.isArray(p.allowed_businesses) ? p.allowed_businesses : ["ALL"];
  const allAllowed = allowed.includes("ALL") || allowed.length === 0;
  const visible = BUSINESS_OPTIONS.filter(opt => opt.key === "ALL" || allAllowed || allowed.includes(opt.key));
  select.innerHTML = visible.map(opt => `<option value="${opt.key}">${opt.label}</option>`).join("");
  select.value = "ALL";
}

function bindEvents() {
  document.querySelectorAll(".period-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentMode = btn.dataset.mode;
      document.querySelectorAll(".period-btn").forEach(b => b.classList.toggle("active", b === btn));
      loadReport();
    });
  });
  document.getElementById("bizSelect").addEventListener("change", loadReport);
}

function initMyBookings() {
  const u = user();
  document.getElementById("userLabel").textContent = u.name || (u.email ? u.email.split("@")[0] : "");
  populateBusinessSelect();
  bindEvents();
  loadReport();
}

checkModuleAccess("my_bookings", initMyBookings);
</script>
