<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATAFORCE — Cargo System Upload</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; font-family: 'Inter', sans-serif; background: #e8eaee; color: #0d1f3c; font-size: 12px; }

  /* ── HEADER ── */
  header {
    background: #0d1f3c;
    padding: 0 16px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-area { display: flex; align-items: center; gap: 6px; }
  .logo-img { height: 22px; }
  .logo-divider { width: 1px; height: 18px; background: #243a5c; margin: 0 10px; }
  .page-title { font-size: 11.5px; font-weight: 500; color: #b8ccec; letter-spacing: 0.03em; }

  /* ── MAIN ── */
  main {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
    min-height: calc(100vh - 38px);
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border: 1px solid #dde0e8;
    border-radius: 6px;
    width: 100%;
    max-width: 400px;
    overflow: hidden;
  }
  .card-header {
    background: #fff;
    border-bottom: 2px solid #0d1f3c;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 500;
    color: #0d1f3c;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .card-body { padding: 20px 18px; }

  /* ── FIELDS ── */
  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    color: #3d4f68;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  input[type="password"] {
    width: 100%;
    border: 1px solid #dde0e8;
    border-radius: 4px;
    background: #f4f5f8;
    color: #0d1f3c;
    padding: 8px 10px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color .15s;
  }
  input[type="password"]:focus { border-color: #1a56db; background: #fff; }

  /* ── DROP ZONE ── */
  .drop-zone {
    border: 1px dashed #b0b8c8;
    border-radius: 4px;
    background: #f4f5f8;
    padding: 22px 16px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color .15s, background .15s;
  }
  .drop-zone:hover, .drop-zone.over {
    border-color: #1a56db;
    background: #eef2fb;
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%; margin: 0;
  }
  .drop-icon { font-size: 22px; margin-bottom: 5px; }
  .drop-label { font-size: 11px; color: #3d4f68; }
  .drop-sub { font-size: 10px; color: #8896aa; margin-top: 3px; }
  .file-chosen {
    font-size: 11px;
    color: #1a56db;
    margin-top: 6px;
    font-weight: 500;
    display: none;
  }

  /* ── BUTTON ── */
  .btn {
    width: 100%;
    margin-top: 4px;
    background: #0d1f3c;
    border: none;
    border-radius: 4px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  .btn:hover:not(:disabled) { background: #162d52; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── RESULT ── */
  .result {
    margin-top: 14px;
    border-radius: 4px;
    padding: 12px 14px;
    font-size: 11px;
    line-height: 1.8;
    display: none;
  }
  .result.success {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    color: #15803d;
    display: block;
  }
  .result.error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #b91c1c;
    display: block;
  }
  .result .val { font-weight: 500; color: #0d1f3c; }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block;
    width: 11px; height: 11px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<main>
  <div class="card">
    <div class="card-header">Weekly Data Update</div>
    <div class="card-body">

      <div class="field">
        <label>Report_Details File</label>
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept=".xlsx,.csv">
          <div class="drop-icon">📄</div>
          <div class="drop-label">Drop file here or click to browse</div>
          <div class="drop-sub">.xlsx or .csv</div>
          <div class="file-chosen" id="fileChosen"></div>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="secretKey" placeholder="••••••••••••">
      </div>

      <button class="btn" id="uploadBtn" onclick="doUpload()" disabled>Upload</button>

      <div class="result" id="result"></div>

    </div>
  </div>
</main>

<script>
  const API_BASE = "https://dataforce-api-production.up.railway.app";

  const fileInput  = document.getElementById('fileInput');
  const fileChosen = document.getElementById('fileChosen');
  const uploadBtn  = document.getElementById('uploadBtn');
  const dropZone   = document.getElementById('dropZone');
  const result     = document.getElementById('result');

  function checkReady() {
    const hasFile = fileInput.files.length > 0;
    const hasKey  = document.getElementById('secretKey').value.trim().length > 0;
    uploadBtn.disabled = !(hasFile && hasKey);
  }

  function showError(msg) {
    result.className = 'result error';
    result.innerHTML = '✗ &nbsp;' + msg;
  }

  function cleanError(raw) {
    if (!raw) return 'Something went wrong. Please try again.';
    if (raw.includes('Expected column not found'))
      return 'Wrong file — make sure you are uploading the raw Report_Details file.';
    if (raw.includes('Could not parse'))
      return 'File could not be read. Check it is a valid .xlsx or .csv.';
    if (raw.includes('Invalid upload key'))
      return 'Incorrect password.';
    if (raw.includes('DB error') || raw.includes('rolled back'))
      return 'Database error. No data was changed — please try again.';
    return 'Something went wrong. Please try again.';
  }

  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    if (!f) return;
    const ext = f.name.split('.').pop().toLowerCase();
    if (ext !== 'xlsx' && ext !== 'csv') {
      showError('Only .xlsx or .csv files are accepted.');
      fileInput.value = '';
      fileChosen.style.display = 'none';
      checkReady();
      return;
    }
    result.className = 'result';
    fileChosen.textContent = '✓ ' + f.name;
    fileChosen.style.display = 'block';
    checkReady();
  });

  document.getElementById('secretKey').addEventListener('input', checkReady);

  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (!f) return;
    const ext = f.name.split('.').pop().toLowerCase();
    if (ext !== 'xlsx' && ext !== 'csv') {
      showError('Only .xlsx or .csv files are accepted.');
      return;
    }
    try {
      const dt = new DataTransfer();
      dt.items.add(f);
      fileInput.files = dt.files;
    } catch(_) { /* Safari fallback: user must click to browse */ }
    result.className = 'result';
    fileChosen.textContent = '✓ ' + f.name;
    fileChosen.style.display = 'block';
    checkReady();
  });

  async function doUpload() {
    const key  = document.getElementById('secretKey').value.trim();
    const file = fileInput.files[0];
    if (!file || !key) return;

    uploadBtn.disabled = true;
    uploadBtn.innerHTML = '<span class="spinner"></span>Processing…';
    result.className = 'result';

    const form = new FormData();
    form.append('file', file);

    try {
      const resp = await apiCall('/api/upload_cargo', {
        method: 'POST',
        headers: { 'x-upload-key': key },
        body: form
      });

      const data = await resp.json();

      if (resp.ok) {
        result.className = 'result success';
        result.innerHTML =
          '✓ &nbsp;Upload complete<br>' +
          'Rows deleted: <span class="val">' + data.deleted_rows.toLocaleString() + '</span><br>' +
          'Rows inserted: <span class="val">' + data.inserted_rows.toLocaleString() + '</span><br>' +
          'Currencies converted: <span class="val">' + data.currency_rows_converted.toLocaleString() + '</span>';
      } else {
        showError(cleanError(data.detail || ''));
      }
    } catch (_) {
      showError('Could not reach the server. Check your connection and try again.');
    }

    uploadBtn.disabled = false;
    uploadBtn.textContent = 'Upload';
  }

// ─── HELPER PARA AUTORIZACIÓN ─────────────────────────────────────
function getAuthHeaders() {
  const saved = sessionStorage.getItem('df_user');
  if (!saved) return {};
  
  const { email } = JSON.parse(saved);
  return {
    'Authorization': `Bearer ${email}`,
    'x-api-key': API_KEY
  };
}

async function apiCall(endpoint, options = {}) {
  const headers = {
    ...getAuthHeaders(),
    ...options.headers || {}
  };
  
  const response = await apiCall('${endpoint}', {
    ...options,
    headers
  });
  
  if (!response.ok) {
    const error = await response.json().catch(() => ({}));
    if (response.status === 403) {
      console.error('Access denied:', error.detail);
      alert(`Access denied: ${error.detail || 'No permission'}`);
      return null;
    }
    throw new Error(`API error: ${response.status}`);
  }
  
  return response.json();
}

</script>
