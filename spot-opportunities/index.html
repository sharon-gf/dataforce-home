<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/jpeg" href="../favicon.jpg">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATAFORCE - Spot Opportunities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#e8eaee;
    --surface:#fff;
    --surface2:#f5f7fb;
    --border:#d8dde8;
    --navy:#0d1f3c;
    --navy2:#1a3360;
    --text1:#0d1f3c;
    --text2:#41536c;
    --text3:#8391a8;
    --blue:#1a56db;
    --green:#15803d;
    --teal:#0c9080;
    --amber:#c97a06;
    --content-width:1180px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { min-height:100%; background:var(--bg); color:var(--text1); font-family:'Inter',sans-serif; font-size:12px; }
  button, input, select { font:inherit; }
  .app { min-height:100vh; padding:8px; }
  .header {
    background:var(--navy);
    border-radius:6px;
    padding:8px 16px;
    display:grid;
    grid-template-columns:minmax(180px,1fr) minmax(280px,1.4fr) minmax(250px,1fr);
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .logo-link { color:#fff; text-decoration:none; display:inline-flex; align-items:center; gap:9px; width:max-content; }
  .df-mark { width:28px; height:28px; border:1px solid rgba(122,174,213,.7); border-radius:4px; display:grid; place-items:center; color:#7aaed5; font-size:12px; font-weight:700; letter-spacing:0; }
  .logo-word { display:flex; flex-direction:column; gap:1px; }
  .logo-main { font-size:18px; letter-spacing:.13em; font-weight:600; line-height:1; }
  .logo-sub { color:#7aaed5; font-size:9px; letter-spacing:.24em; text-transform:uppercase; }
  .hdr-mid { text-align:center; min-width:0; }
  .header-title { color:#7aaed5; letter-spacing:.12em; font-size:17px; font-weight:500; white-space:nowrap; }
  .header-right { color:#fff; display:flex; flex-direction:column; align-items:flex-end; gap:6px; font-size:11px; min-width:0; }
  .header-actions { display:flex; align-items:center; justify-content:flex-end; gap:12px; max-width:100%; }
  .status { color:#8fb5d7; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .dot { width:7px; height:7px; border-radius:99px; background:#c97a06; }
  .logout { border:1px solid #7aaed5; color:#7aaed5; background:transparent; border-radius:3px; padding:4px 10px; cursor:pointer; font-size:10px; }
  .summary-grid { width:min(var(--content-width),100%); margin:0 auto 8px; display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
  .metric-card { background:var(--surface); border:1px solid var(--border); border-radius:6px; min-height:72px; padding:12px; border-top:4px solid var(--teal); }
  .metric-card.cost { border-top-color:var(--amber); }
  .metric-label { color:var(--text3); font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
  .metric-value { color:var(--text1); font-size:20px; line-height:1.1; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .panel { width:min(var(--content-width),100%); margin:0 auto; background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .panel-head { background:var(--navy2); color:#c8d8f0; padding:8px 12px; display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:38px; }
  .panel-title { font-size:11px; font-weight:600; letter-spacing:.09em; text-transform:uppercase; white-space:nowrap; }
  .panel-note { font-size:10px; color:#8fb5d7; white-space:nowrap; }
  .filters { padding:10px 12px; display:grid; grid-template-columns:repeat(4,minmax(130px,1fr)) auto; gap:8px; align-items:end; background:var(--surface2); border-bottom:1px solid var(--border); }
  .field { min-width:0; }
  label { display:block; font-size:9px; font-weight:600; color:var(--text2); letter-spacing:.07em; text-transform:uppercase; margin-bottom:4px; }
  input, select {
    width:100%;
    height:30px;
    border:1px solid var(--border);
    border-radius:4px;
    background:#fff;
    color:var(--text1);
    padding:5px 8px;
    outline:none;
  }
  input:focus, select:focus { border-color:#6d9ce6; box-shadow:0 0 0 2px rgba(26,86,219,.08); }
  .filter-actions { display:flex; gap:6px; align-items:end; justify-content:flex-end; }
  .tool-btn { height:30px; border:1px solid var(--border); background:#fff; color:var(--text1); border-radius:4px; padding:0 10px; font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; white-space:nowrap; }
  .tool-btn.primary { background:var(--navy); color:#fff; border-color:var(--navy); }
  .tool-btn:hover { border-color:#9aa9bd; }
  .table-shell { min-height:520px; }
  .table-wrap { overflow:auto; max-height:650px; padding:0 0 12px; }
  table { width:100%; border-collapse:collapse; min-width:860px; }
  th { position:sticky; top:0; z-index:1; background:var(--navy2); color:#c8d8f0; font-size:9px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; padding:8px; text-align:center; white-space:nowrap; }
  td { border-bottom:1px solid var(--border); padding:8px; text-align:center; color:var(--text1); font-size:11px; white-space:nowrap; }
  tbody tr:nth-child(even) td { background:#f0f2f6; }
  tbody tr:hover td { background:#e4ecfb; }
  .awb { color:var(--blue); font-weight:600; }
  .route { font-weight:600; }
  .ok-cell { width:52px; }
  .ok-check { width:16px; height:16px; cursor:pointer; accent-color:var(--green); }
  .show-ok { display:flex; align-items:center; gap:6px; height:30px; color:var(--text2); font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; white-space:nowrap; }
  .show-ok input { width:14px; height:14px; cursor:pointer; accent-color:var(--green); }
  .empty { padding:38px 16px; color:var(--text3); text-align:center; font-size:12px; }

  @media (max-width:900px) {
    .header { grid-template-columns:1fr; text-align:center; }
    .logo-link { margin:auto; align-items:center; }
    .header-right { align-items:center; }
    .summary-grid { grid-template-columns:1fr; }
    .filters { grid-template-columns:1fr; }
    .filter-actions { justify-content:stretch; }
    .filter-actions .tool-btn { flex:1; }
  }
</style>
<link rel="stylesheet" href="../dataforce-shell.css">
<script>window.DATAFORCE_SHELL = {"title":"Spot Opportunities","userNameId":"userLabel"};</script>
<script src="../dataforce-shell.js"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <a class="logo-link" href="https://dataforce.gsaforce.com/">
      <span class="df-mark">DF</span>
      <span class="logo-word"><span class="logo-main">DATAFORCE</span><span class="logo-sub">GSA Force</span></span>
    </a>
    <div class="hdr-mid"><div class="header-title">SPOT OPPORTUNITIES</div></div>
    <div class="header-right">
      <div class="header-actions">
        <span id="userLabel"></span>
        <span class="status"><span class="dot"></span><span id="statusText">Loading</span></span>
        <button class="logout" type="button" onclick="signOut()">Sign out</button>
      </div>
    </div>
  </div>

  <section class="summary-grid">
    <div class="metric-card">
      <div class="metric-label">AWBs</div>
      <div class="metric-value" id="metricAwbs">0</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Kgs</div>
      <div class="metric-value" id="metricKgs">0</div>
    </div>
    <div class="metric-card cost">
      <div class="metric-label">Avg Cost/Kg</div>
      <div class="metric-value" id="metricCostKg">$0.00</div>
    </div>
    <div class="metric-card cost">
      <div class="metric-label">Avg P/Kg</div>
      <div class="metric-value" id="metricProfitKg">$0.00</div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <div class="panel-title">Mercury Open Booked AWBs</div>
      <div class="panel-note" id="resultNote">0 rows</div>
    </div>
    <div class="filters">
      <div class="field">
        <label for="businessFilter">Business</label>
        <select id="businessFilter"><option value="ALL">All Mercury</option></select>
      </div>
      <div class="field">
        <label for="originFilter">Ori</label>
        <select id="originFilter"><option value="ALL">All origins</option></select>
      </div>
      <div class="field">
        <label for="destinationFilter">Des</label>
        <select id="destinationFilter"><option value="ALL">All destinations</option></select>
      </div>
      <div class="field">
        <label for="carrierFilter">Carrier</label>
        <select id="carrierFilter"><option value="ALL">All carriers</option></select>
      </div>
      <div class="filter-actions">
        <label class="show-ok"><input id="showOkFilter" type="checkbox">Show OK</label>
        <button class="tool-btn" id="resetBtn" type="button">Reset</button>
        <button class="tool-btn primary" id="exportBtn" type="button">Export</button>
      </div>
    </div>
    <div class="table-shell">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>OK</th>
              <th>AWB</th>
              <th>Sales Person</th>
              <th>Kgs</th>
              <th>Seg Ori</th>
              <th>Seg Des</th>
              <th>Carrier</th>
              <th>Flight Date</th>
              <th>Cost/Kg</th>
              <th>P/Kg</th>
            </tr>
          </thead>
          <tbody id="opportunitiesBody"></tbody>
        </table>
      </div>
    </div>
  </section>
</div>

<script src="../permission-guard.js"></script>
<script>
const API_BASE = "https://dataforce-api-production.up.railway.app";
const API_KEY = "We1ykcoHgFV16LPduzqw7qGJlMBPGE06U5L7y5Hg_6I";

let rows = [];
let allRows = [];
let requestSeq = 0;
let filterOptions = {businesses: [], origins: [], destinations: [], carriers: []};
let handledKeys = new Set();

const els = {
  body: document.getElementById("opportunitiesBody"),
  resultNote: document.getElementById("resultNote"),
  business: document.getElementById("businessFilter"),
  origin: document.getElementById("originFilter"),
  destination: document.getElementById("destinationFilter"),
  carrier: document.getElementById("carrierFilter"),
  showOk: document.getElementById("showOkFilter"),
  status: document.getElementById("statusText"),
  dot: document.querySelector(".dot"),
  metricAwbs: document.getElementById("metricAwbs"),
  metricKgs: document.getElementById("metricKgs"),
  metricCostKg: document.getElementById("metricCostKg"),
  metricProfitKg: document.getElementById("metricProfitKg")
};

function user() {
  return getDataforceUser() || {};
}

function signOut() {
  sessionStorage.removeItem("df_user");
  sessionStorage.removeItem("df_permissions");
  window.location.href = "https://dataforce.gsaforce.com/";
}

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
  }[ch]));
}

function fmt(n, digits = 0) {
  return Number(n || 0).toLocaleString(undefined, {
    maximumFractionDigits: digits,
    minimumFractionDigits: digits
  });
}

function money(value) {
  const n = Number(value || 0);
  const sign = n < 0 ? "-$" : "$";
  return `${sign}${fmt(Math.abs(n), 0)}`;
}

function moneyRate(value) {
  if (value === null || value === undefined || value === "") return "-";
  const n = Number(value || 0);
  const sign = n < 0 ? "-$" : "$";
  return `${sign}${Math.abs(n).toFixed(2)}`;
}

function formatAwb(awb, pfx) {
  const raw = String(awb ?? "").trim();
  if (!raw) return "";
  const prefixDigits = String(pfx ?? "").replace(/\D/g, "");
  const parts = raw.split("-");
  const padPrefix = value => value.padStart(3, "0").slice(-3);
  const padNumber = value => value.padStart(8, "0").slice(-8);

  if (parts.length >= 2) {
    const parsedPrefix = parts[0].replace(/\D/g, "");
    const parsedNumber = parts.slice(1).join("").replace(/\D/g, "");
    if (parsedPrefix && parsedNumber) return `${padPrefix(parsedPrefix)}-${padNumber(parsedNumber)}`;
  }

  const numberDigits = raw.replace(/\D/g, "");
  if (prefixDigits && numberDigits) return `${padPrefix(prefixDigits)}-${padNumber(numberDigits)}`;
  if (numberDigits.length > 8) return `${padPrefix(numberDigits.slice(0, -8))}-${padNumber(numberDigits.slice(-8))}`;
  return raw;
}

function handledStorageKey() {
  const email = String(user().email || "unknown").trim().toLowerCase();
  return `spotOpportunitiesHandled:${email}`;
}

function rowKey(row) {
  return [
    formatAwb(row.awb_no || row.awb, row.pfx),
    cleanFilterValue(row.business),
    cleanFilterValue(row.seg_ori),
    cleanFilterValue(row.seg_des),
    cleanFilterValue(row.carrier),
    cleanFilterValue(row.flight_date)
  ].join("|").toUpperCase();
}

function loadHandledKeys() {
  try {
    handledKeys = new Set(JSON.parse(localStorage.getItem(handledStorageKey()) || "[]"));
  } catch (_) {
    handledKeys = new Set();
  }
}

function saveHandledKeys() {
  localStorage.setItem(handledStorageKey(), JSON.stringify(Array.from(handledKeys)));
}

function dateLabel(value) {
  if (!value) return "-";
  const d = new Date(`${value}T00:00:00`);
  if (Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString(undefined, {month:"short", day:"numeric", year:"numeric"});
}

function cleanFilterValue(value) {
  return String(value ?? "").trim();
}

function setStatus(text, ready) {
  els.status.textContent = text;
  els.dot.style.background = ready ? "#22c55e" : "#c97a06";
}

function renderSummary(data) {
  const activeRows = data && data.rows ? data.rows : rows;
  const totalKgs = activeRows.reduce((sum, row) => sum + Number(row.kgs || 0), 0);
  const avgCostKg = activeRows.reduce((sum, row) => sum + (Number(row.cost_kg || 0) * Number(row.kgs || 0)), 0) / Math.max(totalKgs, 1);
  const avgProfitKg = activeRows.reduce((sum, row) => sum + (Number(row.p_kg || 0) * Number(row.kgs || 0)), 0) / Math.max(totalKgs, 1);
  els.metricAwbs.textContent = fmt(activeRows.length);
  els.metricKgs.textContent = fmt(totalKgs);
  els.metricCostKg.textContent = moneyRate(avgCostKg);
  els.metricProfitKg.textContent = moneyRate(avgProfitKg);
}

function optionHtml(value) {
  const clean = cleanFilterValue(value);
  return `<option value="${esc(clean)}">${esc(clean)}</option>`;
}

function syncSelect(select, values, allLabel) {
  const current = cleanFilterValue(select.value || "ALL");
  const cleanValues = (values || []).map(cleanFilterValue).filter(Boolean);
  select.innerHTML = `<option value="ALL">${esc(allLabel)}</option>${cleanValues.map(optionHtml).join("")}`;
  select.value = cleanValues.includes(current) ? current : "ALL";
}

function buildFilterOptions(sourceRows) {
  return {
    businesses: Array.from(new Set(sourceRows.map(row => cleanFilterValue(row.business)).filter(Boolean))).sort(),
    origins: Array.from(new Set(sourceRows.map(row => cleanFilterValue(row.seg_ori)).filter(Boolean))).sort(),
    destinations: Array.from(new Set(sourceRows.map(row => cleanFilterValue(row.seg_des)).filter(Boolean))).sort(),
    carriers: Array.from(new Set(sourceRows.map(row => cleanFilterValue(row.carrier)).filter(Boolean))).sort()
  };
}

function renderFilters(options) {
  filterOptions = options || buildFilterOptions(allRows);
  syncSelect(els.business, filterOptions.businesses, "All Mercury");
  syncSelect(els.origin, filterOptions.origins, "All origins");
  syncSelect(els.destination, filterOptions.destinations, "All destinations");
  syncSelect(els.carrier, filterOptions.carriers, "All carriers");
}

function renderTable() {
  const visibleTotal = els.showOk.checked ? allRows.length : allRows.filter(row => !handledKeys.has(rowKey(row))).length;
  els.resultNote.textContent = allRows.length && rows.length !== visibleTotal
    ? `${rows.length} of ${visibleTotal} rows`
    : `${rows.length} rows`;
  if (!rows.length) {
    els.body.innerHTML = '<tr><td colspan="10" class="empty">No spot opportunities found.</td></tr>';
    return;
  }

  els.body.innerHTML = rows.map(row => `
    <tr>
      <td class="ok-cell"><input class="ok-check" type="checkbox" data-key="${esc(rowKey(row))}" ${handledKeys.has(rowKey(row)) ? "checked" : ""} aria-label="Mark opportunity OK"></td>
      <td class="awb">${esc(formatAwb(row.awb_no || row.awb, row.pfx))}</td>
      <td>${esc(row.sales_person)}</td>
      <td>${fmt(row.kgs)}</td>
      <td class="route">${esc(row.seg_ori)}</td>
      <td class="route">${esc(row.seg_des)}</td>
      <td>${esc(row.carrier)}</td>
      <td>${esc(dateLabel(row.flight_date))}</td>
      <td>${moneyRate(row.cost_kg)}</td>
      <td>${moneyRate(row.p_kg)}</td>
    </tr>
  `).join("");
}

function applyFilters() {
  const business = cleanFilterValue(els.business.value || "ALL");
  const origin = cleanFilterValue(els.origin.value || "ALL");
  const destination = cleanFilterValue(els.destination.value || "ALL");
  const carrier = cleanFilterValue(els.carrier.value || "ALL");
  const showOk = els.showOk.checked;
  rows = allRows.filter(row =>
    (business === "ALL" || cleanFilterValue(row.business) === business) &&
    (origin === "ALL" || cleanFilterValue(row.seg_ori) === origin) &&
    (destination === "ALL" || cleanFilterValue(row.seg_des) === destination) &&
    (carrier === "ALL" || cleanFilterValue(row.carrier) === carrier) &&
    (showOk || !handledKeys.has(rowKey(row)))
  );
  renderSummary({rows});
  renderTable();
}

async function loadOpportunities() {
  const u = user();
  const seq = ++requestSeq;
  setStatus("Loading", false);
  els.body.innerHTML = '<tr><td colspan="10" class="empty">Loading opportunities...</td></tr>';

  const params = new URLSearchParams({
    email: u.email || "",
    limit: "10000"
  });

  try {
    const response = await fetch(`${API_BASE}/api/spot_opportunities?${params.toString()}`, {
      headers: { "x-api-key": API_KEY }
    });
    if (!response.ok) {
      let detail = "";
      try {
        const body = await response.json();
        detail = body.detail ? `: ${body.detail}` : "";
      } catch (_) {}
      throw new Error(`API error ${response.status}${detail}`);
    }
    const data = await response.json();
    if (seq !== requestSeq) return;
    allRows = data.rows || [];
    renderFilters(buildFilterOptions(allRows));
    applyFilters();
    setStatus("Ready", true);
  } catch (e) {
    if (seq !== requestSeq) return;
    console.error("Failed to load Spot Opportunities:", e);
    allRows = [];
    rows = [];
    renderSummary({rows});
    setStatus("Error", false);
    els.body.innerHTML = `<tr><td colspan="10" class="empty">Could not load opportunities. ${esc(e.message || "")}</td></tr>`;
  }
}

function exportCsv() {
  const csv = ["AWB,Sales Person,Kgs,Seg Ori,Seg Des,Carrier,Flight Date,Cost/Kg,P/Kg"]
    .concat(rows.map(r => [
      formatAwb(r.awb_no || r.awb, r.pfx),
      r.sales_person,
      r.kgs,
      r.seg_ori,
      r.seg_des,
      r.carrier,
      r.flight_date,
      r.cost_kg,
      r.p_kg
    ].map(v => `"${String(v ?? "").replace(/"/g, '""')}"`).join(",")))
    .join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "spot-opportunities.csv";
  a.click();
  URL.revokeObjectURL(url);
}

async function checkSpotAccess(initFunction) {
  const u = user();
  const email = u && u.email ? u.email : "";
  if (!email) {
    window.location.href = "https://dataforce.gsaforce.com/";
    return;
  }
  try {
    const response = await fetch(`${API_BASE}/api/user_modules?email=${encodeURIComponent(email)}`, {
      headers: { "x-api-key": API_KEY }
    });
    if (!response.ok) throw new Error("Permission check failed");
    const data = await response.json();
    sessionStorage.setItem("df_permissions", JSON.stringify(data));
    const modules = (data.modules || []).map(m => String(m).toLowerCase().replace(/-/g, "_"));
    if (!modules.includes("spot_opportunities") && !modules.includes("admin")) {
      showNoAccess("Your account is signed in, but this module has not been assigned to you.");
      return;
    }
    initFunction();
  } catch (e) {
    console.error("Error checking access to spot_opportunities:", e);
    showNoAccess("We could not verify your access. Please try again or contact an administrator.");
  }
}

[els.business, els.origin, els.destination, els.carrier, els.showOk].forEach(el => el.addEventListener("change", applyFilters));
els.body.addEventListener("change", event => {
  if (!event.target.classList.contains("ok-check")) return;
  const key = event.target.dataset.key;
  if (!key) return;
  if (event.target.checked) handledKeys.add(key);
  else handledKeys.delete(key);
  saveHandledKeys();
  applyFilters();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  els.business.value = "ALL";
  els.origin.value = "ALL";
  els.destination.value = "ALL";
  els.carrier.value = "ALL";
  els.showOk.checked = false;
  applyFilters();
});
document.getElementById("exportBtn").addEventListener("click", exportCsv);

function initSpotOpportunities() {
  const u = user();
  document.getElementById("userLabel").textContent = u.name || u.email || "";
  loadHandledKeys();
  renderSummary({rows: []});
  loadOpportunities();
}

checkSpotAccess(initSpotOpportunities);
</script>
</body>
</html>
