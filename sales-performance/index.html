<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATAFORCE - Sales Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#e8eaee; --surface:#fff; --surface2:#f5f7fb; --border:#d8dde8;
    --navy:#0d1f3c; --navy2:#1a3360; --text1:#0d1f3c; --text2:#41536c;
    --text3:#8391a8; --blue:#1a56db; --teal:#0c9080; --red:#b91c1c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { min-height:100%; background:var(--bg); color:var(--text1); font-family:'Inter',sans-serif; font-size:12px; }
  body { overflow-x:hidden; }
  .app { min-height:100vh; padding:8px; }
  .header { background:var(--navy); border-radius:6px; padding:8px 16px; display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px; }
  .logo { min-width:180px; }
  .logo a { display:flex; align-items:center; }
  .logo img { height:28px; width:auto; display:block; }
  .hdr-mid-section { flex:1; text-align:center; min-width:0; }
  .header-title { color:#7aaed5; letter-spacing:.12em; font-size:17px; font-weight:500; white-space:nowrap; margin-bottom:7px; }
  .filters { display:flex; justify-content:center; align-items:center; gap:8px; flex-wrap:wrap; }
  .filters label { color:#8fb5d7; font-size:10px; text-transform:uppercase; letter-spacing:.08em; }
  select { min-width:150px; height:26px; border:1px solid #45658d; background:#102847; color:#fff; border-radius:5px; padding:3px 9px; font-size:10px; outline:none; }
  .header-right { min-width:260px; display:flex; flex-direction:column; justify-content:center; align-items:flex-end; gap:5px; color:#fff; font-size:11px; }
  .header-actions { display:flex; justify-content:flex-end; align-items:center; gap:12px; }
  .status { color:#8fb5d7; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .dot { width:7px; height:7px; border-radius:999px; background:#c97a06; }
  .dot.ready { background:#22c55e; }
  .logout { border:1px solid #7aaed5; color:#7aaed5; background:transparent; border-radius:3px; padding:4px 10px; cursor:pointer; font:inherit; font-size:10px; }
  .range { color:#8fb5d7; text-align:right; line-height:1.35; font-size:10px; }
  .range-main { color:#fff; font-size:12px; letter-spacing:.08em; font-weight:500; display:block; }

  .error { background:#fff5f5; border:1px solid #fecaca; color:#991b1b; border-radius:6px; padding:12px; margin-bottom:8px; display:none; }
  .kpi-toggle { width:100%; border:1px solid var(--border); background:#fff; color:var(--text1); border-radius:6px; padding:7px 12px; margin-bottom:8px; font:inherit; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; text-align:left; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
  .kpi-toggle::after { content:"Hide"; color:var(--text3); font-size:10px; }
  .kpi-toggle.collapsed::after { content:"Show"; }
  .kpi-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:8px; margin-bottom:8px; }
  .kpi-grid.collapsed { display:none; }
  .kpi-card { background:#fff; border:1px solid #d0d4dc; border-radius:5px; overflow:hidden; min-height:78px; }
  .kpi-card.nodata { opacity:.55; }
  .kpi-head { background:#fff; height:30px; border-top:4px solid var(--teal); padding:5px 10px 0; display:flex; align-items:center; }
  .kpi-card.total .kpi-head { border-top-color:var(--blue); }
  .kpi-title { color:#093c71; font-size:12px; font-weight:600; letter-spacing:.03em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .kpi-body { display:flex; padding:5px 6px 7px; background:#f8f9fc; gap:2px; }
  .kpi-metric { flex:1; text-align:center; min-width:0; }
  .metric-label { color:#aaa; font-size:7.5px; text-transform:uppercase; letter-spacing:.03em; margin-bottom:2px; }
  .metric-value { color:#0d1f3c; font-size:12px; font-weight:500; line-height:1.3; white-space:nowrap; }
  .customer-kpi-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:8px; margin-bottom:8px; }
  .customer-kpi-grid.collapsed { display:none; }
  .customer-kpi { background:#fff; border:1px solid #d0d4dc; border-radius:5px; padding:11px 13px; min-height:78px; }
  .customer-kpi.risk { border-color:#ef9a9a; }
  .customer-kpi .metric-value { text-align:left; font-size:22px; margin-top:8px; }
  .customer-kpi .metric-note { color:var(--text3); font-size:10px; margin-top:5px; }
  .customer-kpi.risk .metric-value { color:#d62828; }

  .content-grid { display:grid; grid-template-columns:minmax(0,1.25fr) minmax(300px,.55fr) minmax(320px,.65fr); gap:8px; margin-bottom:8px; }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; min-height:260px; }
  .panel-head { background:var(--navy2); color:#c8d8f0; padding:8px 12px; display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:38px; }
  .panel-title { font-size:11px; font-weight:600; letter-spacing:.09em; text-transform:uppercase; }
  .panel-note { font-size:10px; color:#8fb5d7; white-space:nowrap; }
  .trend { padding:6px 10px 8px; min-height:342px; }
  .chart-wrap { position:relative; width:100%; height:314px; }
  .trend-legend { display:flex; justify-content:flex-end; gap:14px; color:var(--text2); font-size:10px; margin-bottom:2px; }
  .legend-item { display:flex; align-items:center; gap:5px; }
  .legend-swatch { width:18px; height:3px; border-radius:99px; background:#1a56db; }
  .legend-swatch.prev { background:#e05555; }
  .chart-card-body { padding:12px; min-height:342px; display:flex; flex-direction:column; justify-content:center; }
  .pie-box { min-height:224px; display:flex; align-items:center; justify-content:center; }
  .pie-box .chart-wrap { height:224px; }
  .bar-box .chart-wrap { height:228px; }
  .priority-legend, .risk-legend { display:grid; gap:9px; padding:8px 4px 0; font-size:10px; color:var(--text2); }
  .legend-row { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:8px; }
  .legend-total { display:flex; justify-content:space-between; border-top:1px solid var(--border); margin-top:6px; padding-top:10px; color:var(--text1); font-weight:600; }
  .dot-priority { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:4px; }
  .priority-cell { display:inline-flex; align-items:center; justify-content:center; gap:7px; font-weight:600; }
  .priority-dot { width:11px; height:11px; border-radius:50%; display:inline-block; box-shadow:0 0 0 2px rgba(255,255,255,.7); }
  .priority-dot.red { background:#d62828; }
  .priority-dot.orange { background:#f28c18; }
  .priority-dot.yellow { background:#e6c229; }
  .priority-dot.green { background:#2eaa4f; }
  .risk-red { color:#d62828; font-weight:600; }
  .risk-orange { color:#d97706; font-weight:600; }
  .risk-yellow { color:#b08900; font-weight:600; }
  .risk-green { color:#17803d; font-weight:600; }
  .badge { display:inline-block; min-width:48px; text-align:center; border-radius:5px; padding:3px 7px; font-size:10px; font-weight:600; }
  .badge.red { color:#d62828; background:#fde8e8; }
  .badge.orange { color:#d97706; background:#fff1dc; }
  .badge.yellow { color:#9a7600; background:#fff8cc; }
  .badge.green { color:#17803d; background:#e5f6ea; }
  .drop-cell { color:#d62828; font-weight:600; }

  table { width:100%; border-collapse:collapse; }
  th { background:var(--navy2); color:#c8d8f0; font-size:9px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; padding:7px 8px; text-align:right; white-space:nowrap; }
  th:first-child, td:first-child { text-align:left; }
  td { border-bottom:1px solid var(--border); padding:7px 8px; text-align:right; color:var(--text1); font-size:11px; white-space:nowrap; }
  tbody tr:nth-child(even) td { background:#f0f2f6; }
  .table-scroll { max-height:322px; overflow:auto; }
  .matrix-panel { min-height:420px; }
  .matrix-scroll { max-height:430px; overflow:auto; }
  .matrix-table { min-width:760px; }
  .matrix-table thead th { position:sticky; top:0; z-index:3; background:var(--navy2); }
  .matrix-table th:first-child, .matrix-table td:first-child { position:sticky; left:0; z-index:2; min-width:220px; max-width:260px; overflow:hidden; text-overflow:ellipsis; }
  .matrix-table th:first-child { z-index:5; background:var(--navy2); }
  .matrix-table tbody tr:nth-child(even) td:first-child { background:#f0f2f6; }
  .matrix-table tbody tr:nth-child(odd) td:first-child { background:#fff; }
  .opportunity-table th, .opportunity-table td { text-align:center; }
  .opportunity-table th:nth-child(2), .opportunity-table td:nth-child(2) { text-align:left; }
  .opportunity-table th:first-child, .opportunity-table td:first-child { position:static; min-width:auto; max-width:none; }
  .help-tip { position:relative; display:inline-flex; align-items:center; justify-content:center; width:13px; height:13px; margin-left:4px; border:1px solid rgba(200,216,240,.7); border-radius:50%; color:#c8d8f0; font-size:8px; line-height:1; cursor:help; vertical-align:middle; }
  .help-tip::after { content:attr(data-tip); position:absolute; left:50%; top:calc(100% + 8px); transform:translateX(-50%); width:210px; padding:8px 9px; border-radius:5px; background:#0d1f3c; color:#fff; font-size:10px; line-height:1.35; letter-spacing:0; text-transform:none; white-space:normal; opacity:0; pointer-events:none; box-shadow:0 8px 22px rgba(13,31,60,.22); z-index:20; }
  .help-tip:hover::after, .help-tip:focus::after { opacity:1; }
  .empty, .loading { padding:34px 16px; color:var(--text3); text-align:center; font-size:12px; }

  @media (max-width:980px) {
    .header { flex-wrap:wrap; padding:10px 12px; }
    .logo { order:1; flex:1 1 45%; min-width:0; }
    .logo img { height:30px; }
    .header-right { order:2; flex:1 1 45%; min-width:0; }
    .header-actions { flex-wrap:wrap; row-gap:5px; }
    .hdr-mid-section { order:3; flex:1 1 100%; margin-top:10px; }
    .kpi-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .customer-kpi-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .content-grid { grid-template-columns:1fr; }
  }
  @media (max-width:560px) {
    .filters { width:100%; }
    select { width:100%; }
    .header-title { font-size:15px; }
    .header-right { align-items:center; }
    .range { text-align:center; }
    .kpi-grid { grid-template-columns:1fr; }
    .customer-kpi-grid { grid-template-columns:1fr; }
    .chart-wrap { height:260px; }
  }
</style>

<body>
<div class="app">
  <header class="header">
    <div class="logo"><a href="/" aria-label="Back to DATAFORCE home"><img src="../dataforce-logo.png" alt="DATAFORCE"></a></div>
    <div class="hdr-mid-section">
      <div class="header-title">SALES PERFORMANCE</div>
      <div class="filters">
        <label for="salesSelect">Sales Person</label>
        <select id="salesSelect"></select>
        <label for="businessSelect">Business</label>
        <select id="businessSelect"></select>
        <label for="gsaSelect">GSA</label>
        <select id="gsaSelect"></select>
      </div>
    </div>
    <div class="header-right">
      <div class="header-actions">
        <span id="userLabel"></span>
        <span class="status"><span class="dot" id="statusDot"></span><span id="statusText">Loading</span></span>
        <button class="logout" onclick="signOut()">Sign out</button>
      </div>
      <div class="range"><span class="range-main" id="rangeTitle">-</span><span id="rangeDates">-</span></div>
    </div>
  </header>

  <div class="error" id="errorBox"></div>
  <button class="kpi-toggle" type="button" id="kpiToggle" aria-expanded="true">YTD Flown Summary</button>
  <section class="kpi-grid" id="bookedCards"><div class="loading">Loading YTD flown summary...</div></section>
  <button class="kpi-toggle" type="button" id="customerToggle" aria-expanded="true">Customer Opportunity Summary</button>
  <section class="customer-kpi-grid" id="customerCards"><div class="loading">Loading customer summary...</div></section>

  <section class="content-grid">
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Flown Tons By Week</div><div class="panel-note" id="trendNote">Flight date YTD</div></div>
      <div class="trend" id="trendBox"></div>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Priority Distribution</div><div class="panel-note">Customer health</div></div>
      <div class="chart-card-body">
        <div class="pie-box"><div class="chart-wrap"><canvas id="priorityChart"></canvas></div></div>
        <div class="priority-legend" id="priorityLegend"></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Tons At Risk By Priority</div><div class="panel-note">Weekly avg gap</div></div>
      <div class="chart-card-body bar-box">
        <div class="chart-wrap"><canvas id="riskChart"></canvas></div>
        <div class="risk-legend" id="riskLegend"></div>
      </div>
    </div>
  </section>

  <section class="panel matrix-panel">
    <div class="panel-head"><div class="panel-title">Customer Opportunity Map</div><div class="panel-note" id="opportunityNote">Prior 7 weeks vs recent 3 weeks</div></div>
    <div class="matrix-scroll">
      <table class="matrix-table opportunity-table">
        <thead id="opportunityHead"></thead>
        <tbody id="opportunityBody"></tbody>
      </table>
    </div>
  </section>
</div>

<script src="../permission-guard.js"></script>
<script>
const API_BASE = "https://dataforce-api-production.up.railway.app";
const API_KEY = "We1ykcoHgFV16LPduzqw7qGJlMBPGE06U5L7y5Hg_6I";
let currentData = null;
let trendChart = null;
let priorityChart = null;
let riskChart = null;
let requestSeq = 0;
let activeRequest = null;

function user() {
  try { return JSON.parse(sessionStorage.getItem("df_user") || "{}"); }
  catch (e) { return {}; }
}
function signOut() {
  sessionStorage.removeItem("df_user");
  sessionStorage.removeItem("df_permissions");
  window.location.href = "https://dataforce.gsaforce.com/";
}
function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
}
function num(value, digits = 0) {
  return Number(value || 0).toLocaleString(undefined, { maximumFractionDigits:digits, minimumFractionDigits:digits });
}
function money(value) {
  const n = Number(value || 0);
  const abs = Math.abs(n);
  if (abs >= 1000000) return `${(n / 1000000).toFixed(abs >= 10000000 ? 0 : 1)}M`;
  if (abs >= 1000) return `${Math.round(n / 1000)}K`;
  return n.toLocaleString(undefined, { maximumFractionDigits:0 });
}
function pkg(value) {
  const n = Number(value || 0);
  return n ? n.toFixed(2) : "-";
}
function shortCustomer(value) {
  const text = String(value || "-");
  return text.length > 26 ? `${text.slice(0, 23)}...` : text;
}
function formatDate(value) {
  if (!value) return "-";
  return new Date(`${value}T00:00:00`).toLocaleDateString(undefined, { month:"short", day:"numeric", year:"numeric" });
}
function setStatus(text, ready) {
  document.getElementById("statusText").textContent = text;
  document.getElementById("statusDot").classList.toggle("ready", Boolean(ready));
}
function showError(message) {
  const box = document.getElementById("errorBox");
  box.textContent = message || "";
  box.style.display = message ? "block" : "none";
}

function renderSalesSelect() {
  const select = document.getElementById("salesSelect");
  const people = currentData.salesPersons || [];
  const locked = currentData.lockedSalesPerson;
  const selected = currentData.selectedSalesPerson || "ALL";
  const options = locked ? people : ["ALL"].concat(people);
  select.innerHTML = options.map(person => `<option value="${esc(person)}">${person === "ALL" ? "All Sales Persons" : esc(person)}</option>`).join("");
  select.value = selected;
  select.disabled = Boolean(locked);
}

function renderBusinessSelect() {
  const select = document.getElementById("businessSelect");
  const options = currentData.businessOptions || [{ key:"ALL", label:"All" }];
  const selected = currentData.selectedBusiness || "ALL";
  select.innerHTML = options.map(biz => `<option value="${esc(biz.key)}">${biz.key === "ALL" ? "All Businesses" : esc(biz.label || biz.key)}</option>`).join("");
  select.value = selected;
}

function renderGsaSelect() {
  const select = document.getElementById("gsaSelect");
  const options = currentData.gsaOptions || [];
  const selected = currentData.selectedGsa || "ALL";
  select.innerHTML = [`<option value="ALL">All GSAs</option>`].concat(
    options.map(gsa => `<option value="${esc(gsa)}">${esc(gsa)}</option>`)
  ).join("");
  select.value = selected;
  select.disabled = options.length === 0;
}

function renderCards() {
  const cards = currentData.bookedCards || [];
  document.getElementById("bookedCards").innerHTML = cards.length ? cards.map((card, index) => `
    <div class="kpi-card ${card.total || index === 0 ? "total" : ""} ${Number(card.tons || 0) ? "" : "nodata"}">
      <div class="kpi-head"><div class="kpi-title" title="${esc(card.label)}">${esc(card.label || card.key || "-")}</div></div>
      <div class="kpi-body">
        <div class="kpi-metric"><div class="metric-label"># Bkgs</div><div class="metric-value">${num(card.bookings)}</div></div>
        <div class="kpi-metric"><div class="metric-label">Tons</div><div class="metric-value">${num(card.tons, 1)}</div></div>
        <div class="kpi-metric"><div class="metric-label">Rev</div><div class="metric-value">${money(card.revenue || card.rev)}</div></div>
        <div class="kpi-metric"><div class="metric-label">P/KG</div><div class="metric-value">${pkg(card.profit_per_kg)}</div></div>
      </div>
    </div>
  `).join("") : '<div class="empty">No YTD flown data for this period.</div>';
}

function renderTrend() {
  const rows = currentData.trend || [];
  const prevRows = currentData.trendPrev || [];
  const box = document.getElementById("trendBox");
  const max = Math.max(...rows.concat(prevRows).map(r => Number(r.tons || 0)), 0);
  if (!rows.length || max <= 0) {
    if (trendChart) trendChart.destroy();
    trendChart = null;
    box.innerHTML = '<div class="empty">No flown trend data.</div>';
    return;
  }
  const year = new Date().getFullYear();
  const labels = Array.from({ length:52 }, (_, i) => `W${i + 1}`);
  const toSeries = source => {
    const values = Array(52).fill(null);
    source.forEach(r => {
      const week = Number(r.period_week || 0);
      if (week >= 1 && week <= 52) values[week - 1] = Number(r.tons || 0);
    });
    return values;
  };
  box.innerHTML = `
    <div class="trend-legend">
      <span class="legend-item"><span class="legend-swatch"></span>${year}</span>
      ${prevRows.length ? `<span class="legend-item"><span class="legend-swatch prev"></span>${year - 1}</span>` : ""}
    </div>
    <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
  `;
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById("trendChart"), {
    type:"line",
    data:{ labels, datasets:[
      { label:String(year), data:toSeries(rows), borderColor:"#4a8eff", borderWidth:1.5, pointRadius:1, pointHoverRadius:5, tension:0.3, fill:false, spanGaps:false },
      ...(prevRows.length ? [{ label:String(year - 1), data:toSeries(prevRows), borderColor:"#e05555", borderWidth:1.5, pointRadius:1, pointHoverRadius:4, tension:0.3, fill:false, spanGaps:false }] : [])
    ]},
    options:{
      responsive:true, maintainAspectRatio:false, interaction:{mode:"index", intersect:false},
      plugins:{ legend:{display:false}, tooltip:{backgroundColor:"#0d1f3c", titleColor:"#7aaae8", bodyColor:"#d8e4f4", padding:8} },
      scales:{
        x:{grid:{color:"rgba(0,0,0,.05)"}, ticks:{color:"#8896aa", font:{size:8}, maxRotation:45, autoSkip:false, callback:function(value, index){ return index % 2 ? "" : this.getLabelForValue(value); }}},
        y:{grid:{color:"rgba(0,0,0,.05)"}, ticks:{color:"#8896aa", font:{size:8}}, beginAtZero:true}
      }
    }
  });
}

function priorityColor(key) {
  return { red:"#d62828", orange:"#f28c18", yellow:"#e6c229", green:"#2eaa4f" }[key] || "#8391a8";
}
function priorityClass(key) {
  return { red:"risk-red", orange:"risk-orange", yellow:"risk-yellow", green:"risk-green" }[key] || "";
}
function formatPct(value) {
  return `${num(value, 1)}%`;
}
function formatDrop(value) {
  const drop = Number(value || 0);
  return drop > 0 ? `-${num(drop, 1)}% ↓` : "0.0%";
}
function helpTip(text) {
  return `<span class="help-tip" tabindex="0" data-tip="${esc(text)}">?</span>`;
}

function renderCustomerCards() {
  const analysis = currentData.opportunityAnalysis || {};
  const s = analysis.summary || {};
  document.getElementById("customerCards").innerHTML = `
    <div class="customer-kpi"><div class="metric-label">Active Customers</div><div class="metric-value">${num(s.activeCustomers)}</div><div class="metric-note">With YTD flown cargo</div></div>
    <div class="customer-kpi risk"><div class="metric-label">Customers At Risk</div><div class="metric-value">${num(s.atRiskCustomers)}</div><div class="metric-note">Red, orange or yellow</div></div>
    <div class="customer-kpi"><div class="metric-label">% At Risk</div><div class="metric-value">${num(s.atRiskPct, 1)}%</div><div class="metric-note">Of active customers</div></div>
    <div class="customer-kpi risk"><div class="metric-label">Tons At Risk</div><div class="metric-value">${num(s.tonsRisk, 1)}</div><div class="metric-note">Weekly avg gap</div></div>
    <div class="customer-kpi"><div class="metric-label">Healthy Customers</div><div class="metric-value">${num(s.healthyCustomers)}</div><div class="metric-note">OK priority</div></div>
  `;
}

function renderOpportunityCharts() {
  const analysis = currentData.opportunityAnalysis || {};
  const rows = analysis.prioritySummary || [];
  const labels = rows.map(r => r.label);
  const colors = rows.map(r => priorityColor(r.key));
  const counts = rows.map(r => Number(r.count || 0));
  const tons = rows.map(r => Number(r.tonsRisk || 0));
  const totalCount = counts.reduce((sum, value) => sum + value, 0);
  const totalTons = tons.reduce((sum, value) => sum + value, 0);
  const pieOptions = {
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
      legend:{ display:false },
      title:{ display:true, text:"Customers", color:"#0d1f3c", font:{ size:11, weight:"600" } },
      tooltip:{ backgroundColor:"#0d1f3c", titleColor:"#7aaae8", bodyColor:"#d8e4f4", padding:8 }
    },
    cutout:"62%"
  };
  const barOptions = {
    indexAxis:"y",
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
      legend:{ display:false },
      tooltip:{ backgroundColor:"#0d1f3c", titleColor:"#7aaae8", bodyColor:"#d8e4f4", padding:8 }
    },
    scales:{
      x:{ beginAtZero:true, grid:{color:"rgba(0,0,0,.06)"}, ticks:{color:"#8391a8", font:{size:9}} },
      y:{ grid:{display:false}, ticks:{color:"#0d1f3c", font:{size:10}} }
    }
  };
  if (priorityChart) priorityChart.destroy();
  if (riskChart) riskChart.destroy();
  priorityChart = new Chart(document.getElementById("priorityChart"), {
    type:"doughnut",
    data:{ labels, datasets:[{ data:counts, backgroundColor:colors, borderWidth:0 }] },
    options:pieOptions
  });
  riskChart = new Chart(document.getElementById("riskChart"), {
    type:"bar",
    data:{ labels, datasets:[{ data:tons, backgroundColor:colors, borderWidth:0, borderRadius:3, barThickness:22 }] },
    options:barOptions
  });
  document.getElementById("priorityLegend").innerHTML = rows.map(r => `
    <div class="legend-row"><span class="dot-priority" style="background:${priorityColor(r.key)}"></span><span>${esc(r.label)}</span><strong>${num(r.count)} (${totalCount ? num((Number(r.count || 0) / totalCount) * 100, 0) : 0}%)</strong></div>
  `).join("") + `<div class="legend-total"><span>Total</span><span>${num(totalCount)} customers</span></div>`;
  document.getElementById("riskLegend").innerHTML = rows.map(r => `
    <div class="legend-row"><span class="dot-priority" style="background:${priorityColor(r.key)}"></span><span>${esc(r.label)}</span><strong>${num(r.tonsRisk, 1)} tons</strong></div>
  `).join("") + `<div class="legend-total"><span>Total</span><span>${num(totalTons, 1)} tons</span></div>`;
}

function renderOpportunityTable() {
  const analysis = currentData.opportunityAnalysis || {};
  const rows = analysis.rows || [];
  document.getElementById("opportunityNote").textContent = `Prior ${analysis.priorWeeks || 7} weeks vs recent ${analysis.recentWeeks || 3} weeks`;
  document.getElementById("opportunityHead").innerHTML = `
    <tr>
      <th>Priority ${helpTip("Risk color is based on drop percent or weeks since the last shipment.")}</th>
      <th>Customer</th>
      <th>Prior Avg ${helpTip("Average flown tons per week during the prior baseline period.")}</th>
      <th>Recent Avg ${helpTip("Average flown tons per week during the most recent period.")}</th>
      <th>Drop ${helpTip("Percent decline from prior average to recent average.")}</th>
      <th>Tons Risk ${helpTip("Prior average tons minus recent average tons. OK customers are not counted in total tons at risk.")}</th>
      <th>Weeks Since ${helpTip("Completed weeks since the customer's latest shipment flight date.")}</th>
      <th>Last Shipment ${helpTip("Most recent flight date for this customer.")}</th>
      <th>Likely Reason ${helpTip("Rule-based explanation using drop percent and shipment gap.")}</th>
      <th>Potential ${helpTip("Commercial priority from the risk category.")}</th>
    </tr>
  `;
  document.getElementById("opportunityBody").innerHTML = rows.length ? rows.map(row => `
    <tr>
      <td>
        <span class="priority-cell ${priorityClass(row.priority)}">
          <span class="priority-dot ${esc(row.priority)}"></span>${esc(row.priorityLabel)}
        </span>
      </td>
      <td title="${esc(row.customer)}">${esc(shortCustomer(row.customer))}</td>
      <td>${num(row.priorAvgTons, 2)}</td>
      <td>${num(row.recentAvgTons, 2)}</td>
      <td class="${Number(row.dropPct || 0) > 0 ? "drop-cell" : ""}">${formatDrop(row.dropPct)}</td>
      <td>${num(row.tonsRisk, 2)}</td>
      <td>${row.weeksSinceLast == null ? "-" : num(row.weeksSinceLast)}</td>
      <td>${row.lastShipment ? formatDate(row.lastShipment) : "-"}</td>
      <td title="${esc(row.reason)}">${esc(row.reason)}</td>
      <td><span class="badge ${esc(row.priority)}">${esc(row.potential)}</span></td>
    </tr>
  `).join("") : '<tr><td colspan="10" class="empty">No customer health data.</td></tr>';
}

function renderAll() {
  renderSalesSelect();
  renderBusinessSelect();
  renderGsaSelect();
  document.getElementById("rangeTitle").textContent = `${currentData.periodLabel || "YTD"} Flown`.toUpperCase();
  document.getElementById("rangeDates").textContent = `${formatDate(currentData.start)} - ${formatDate(currentData.end)}`;
  const salesLabel = currentData.selectedSalesPerson === "ALL" ? "All sales persons" : currentData.selectedSalesPerson;
  const selectedBiz = (currentData.businessOptions || []).find(biz => biz.key === currentData.selectedBusiness);
  const bizLabel = currentData.selectedBusiness === "ALL" ? "All businesses" : (selectedBiz?.label || currentData.selectedBusiness);
  const gsaLabel = currentData.selectedGsa === "ALL" ? "All GSAs" : currentData.selectedGsa;
  document.getElementById("trendNote").textContent = `${salesLabel} · ${bizLabel} · ${gsaLabel}`;
  renderCards();
  renderCustomerCards();
  renderTrend();
  renderOpportunityCharts();
  renderOpportunityTable();
}

async function loadReport() {
  const u = user();
  const salesPerson = document.getElementById("salesSelect").value || "ALL";
  const business = document.getElementById("businessSelect").value || "ALL";
  const gsa = document.getElementById("gsaSelect").value || "ALL";
  const seq = ++requestSeq;
  if (activeRequest) activeRequest.abort();
  activeRequest = new AbortController();
  setStatus("Loading reports", false);
  showError("");
  try {
    const params = new URLSearchParams({ email:u.email || "", sales_person:salesPerson, business, gsa });
    const r = await fetch(`${API_BASE}/api/sales_performance?${params.toString()}`, {
      headers:{ "x-api-key":API_KEY },
      signal:activeRequest.signal
    });
    if (!r.ok) {
      let detail = "";
      try { detail = (await r.json()).detail || ""; } catch (_) {}
      throw new Error(detail || `API error ${r.status}`);
    }
    const data = await r.json();
    if (seq !== requestSeq) return;
    currentData = data;
    renderAll();
    showError((data.errors || []).join(" · "));
    setStatus("Ready", true);
  } catch (e) {
    if (seq !== requestSeq) return;
    if (e.name === "AbortError") return;
    console.error("Failed to load Sales Performance:", e);
    setStatus("Error", false);
    showError(`Could not load Sales Performance. ${e.message || "Please refresh or contact an administrator."}`);
  } finally {
    if (seq === requestSeq) activeRequest = null;
  }
}

function bindEvents() {
  document.getElementById("salesSelect").addEventListener("change", loadReport);
  document.getElementById("businessSelect").addEventListener("change", loadReport);
  document.getElementById("gsaSelect").addEventListener("change", loadReport);
  document.getElementById("kpiToggle").addEventListener("click", () => {
    const cards = document.getElementById("bookedCards");
    const button = document.getElementById("kpiToggle");
    const collapsed = cards.classList.toggle("collapsed");
    button.classList.toggle("collapsed", collapsed);
    button.setAttribute("aria-expanded", String(!collapsed));
  });
  document.getElementById("customerToggle").addEventListener("click", () => {
    const cards = document.getElementById("customerCards");
    const button = document.getElementById("customerToggle");
    const collapsed = cards.classList.toggle("collapsed");
    button.classList.toggle("collapsed", collapsed);
    button.setAttribute("aria-expanded", String(!collapsed));
  });
}

function initSalesPerformance() {
  const u = user();
  document.getElementById("userLabel").textContent = u.name || (u.email ? u.email.split("@")[0] : "");
  document.getElementById("salesSelect").innerHTML = '<option value="ALL">All Sales Persons</option>';
  document.getElementById("businessSelect").innerHTML = '<option value="ALL">All Businesses</option>';
  document.getElementById("gsaSelect").innerHTML = '<option value="ALL">All GSAs</option>';
  bindEvents();
  loadReport();
}

checkModuleAccess("sales_performance", initSalesPerformance);
</script>
