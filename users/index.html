<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATAFORCE — User Administration</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #e8eaee;
  --surface:  #ffffff;
  --surface2: #f4f5f8;
  --border:   #dde0e8;
  --navy:     #0d1f3c;
  --navy2:    #162d52;
  --navy-hdr: #1a3360;
  --text1:    #0d1f3c;
  --text2:    #3d4f68;
  --text3:    #8896aa;
  --blue:     #1a56db;
  --stripe:   #f0f2f6;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; min-height:100%; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text1); font-size:11px; }

/* LOGO */
.logo-svg { height:28px; width:auto; object-fit:contain; }

/* ── HEADER ── */
header {
  background:var(--navy);
  padding:10px 16px;
  height:auto;
  display:flex; align-items:center; gap:10px;
  flex-shrink:0;
  border-radius:6px;
  margin:8px;
}
.logo-area { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.hdr-div   { width:1px; height:20px; background:#243a5c; flex-shrink:0; }

/* Bloque central */
.hdr-mid { flex:1; text-align:center; }
.hdr-module-name {
  font-size:18px; font-weight:500; color:#7aaed5;
  letter-spacing:0.05em; line-height:1.2; margin:0; padding:0;
}

/* Derecha */
.header-right { text-align:right; flex-shrink:0; }
.user-info { font-size:11px; color:#fff; }
.logout-btn { background:transparent; border:1px solid #7aaed5; color:#7aaed5; padding:4px 10px; border-radius:3px; font-size:9px; cursor:pointer; margin-left:10px; transition:all 0.2s; }
.logout-btn:hover { background:#7aaed5; color:var(--navy); }

/* ── LOGIN ── */
#login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--navy); }
.login-box { background:#1a2a45; padding:2rem; border-radius:6px; text-align:center; width:100%; max-width:360px; border:1px solid #7aaed5; }
.login-title { color:#7aaed5; font-size:16px; font-weight:400; letter-spacing:1px; margin-bottom:1rem; }
.login-desc { color:#7aaed5; font-size:10px; font-weight:300; margin-bottom:1.5rem; }
#login-error { display:none; background:#8b3a3a; color:#ffcccc; padding:10px; border-radius:4px; font-size:10px; margin-bottom:1rem; }

/* ── MAIN ── */
#app { display:none; flex-direction:column; min-height:100vh; background:var(--bg); }
main { padding:8px 80px 24px; display:flex; flex-direction:column; gap:8px; }

/* ── PAGE TITLE ── */
.page-title { color:var(--text1); font-size:14px; font-weight:500; margin:0; }
.page-desc { color:var(--text3); font-size:9px; font-weight:300; margin:0; }

/* ── CONTROLS ── */
.controls-row { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; align-items:center; }
.search-box { flex:1; min-width:200px; }
.search-box input { width:100%; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:10px; background:var(--surface); }
.search-box input:focus { outline:none; border-color:var(--blue); }
.filter-select { padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:10px; background:var(--surface); }
.add-btn { background:var(--blue); color:#fff; border:none; padding:6px 12px; border-radius:4px; font-size:10px; font-weight:500; cursor:pointer; white-space:nowrap; }
.add-btn:hover { background:#0d47a1; }

/* ── STATS ── */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:8px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:8px 10px; text-align:center; }
.stat-label { font-size:8px; color:var(--text3); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
.stat-value { font-size:18px; font-weight:500; color:var(--blue); }

/* ── TABLE ── */
.tbl-wrap { overflow-x:auto; background:var(--surface); border:1px solid var(--border); border-radius:6px; }
.dtbl { width:100%; border-collapse:collapse; }
.dtbl th {
  text-align:left; color:#c8d8f0; font-weight:500; font-size:8px; letter-spacing:0.05em; text-transform:uppercase;
  padding:6px 8px; background:var(--navy-hdr); white-space:nowrap;
}
.dtbl th:nth-child(3) { text-align:center; }
.dtbl th:nth-child(n+4) { text-align:right; }
.dtbl td {
  text-align:left; padding:6px 8px; color:var(--text1); font-size:9.5px; border-bottom:1px solid var(--border); white-space:nowrap;
}
.dtbl td:nth-child(3) { text-align:center; }
.dtbl td:nth-child(n+4) { text-align:right; }
.dtbl tbody tr:nth-child(even) td { background:var(--stripe); }
.dtbl tbody tr:nth-child(odd)  td { background:var(--surface); }
.dtbl tbody tr:hover td { background:#e8edf7 !important; }

.status-badge { display:inline-block; padding:3px 6px; border-radius:3px; font-size:8px; font-weight:500; }
.status-active { background:#c8d8f0; color:var(--navy); }
.status-inactive { background:#e8c4c4; color:#8b3a3a; }

.btn-edit, .btn-delete { background:transparent; border:1px solid var(--border); padding:4px 8px; border-radius:3px; cursor:pointer; font-size:8px; color:var(--text1); transition:all 0.2s; }
.btn-edit:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-delete:hover { background:#8b3a3a; color:#fff; border-color:#8b3a3a; }

/* ── LOADING ── */
.loading { text-align:center; color:var(--text3); padding:40px; font-size:11px; }
.empty-state { display:none; text-align:center; padding:30px; color:var(--text3); font-size:11px; background:var(--surface); border-radius:6px; border:1px solid var(--border); }

/* ── MODAL ── */
#editModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
#editModal.active { display:flex; }
.modal { background:var(--surface); border-radius:6px; padding:20px; max-width:550px; width:100%; max-height:90vh; overflow-y:auto; }
.modal h3 { color:var(--text1); font-size:14px; font-weight:500; margin-bottom:12px; }

.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:9px; font-weight:600; color:var(--text1); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.05em; }
.form-group input, .form-group select { width:100%; padding:8px; border:1px solid var(--border); border-radius:4px; font-size:11px; background:var(--surface); color:var(--text1); }
.form-group input:focus, .form-group select:focus { outline:none; border-color:var(--blue); }

/* Updated Checkbox Layout Container */
.checkbox-group { 
  border:1px solid var(--border); 
  border-radius:4px; 
  padding:10px; 
  max-height:200px; 
  overflow-y:auto; 
  background:var(--surface2); 
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px 12px; 
}

/* Updated Checkbox Alignment Settings */
.checkbox-item { 
  display:flex; 
  align-items:center; 
  gap:6px; 
  font-size:10px; 
  width: 100%;
}
.checkbox-item input[type="checkbox"] { 
  width: auto;
  margin:0; 
  flex-shrink:0; 
  cursor: pointer;
}
.checkbox-item label { 
  margin:0; 
  font-weight:400; 
  cursor:pointer; 
  text-align:left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-transform: none;
}
.select-all-btn { font-size:9px; color:var(--blue); background:none; border:none; padding:2px 0 6px 0; cursor:pointer; font-weight:500; display:block; }

.modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; border-top:1px solid var(--border); padding-top:12px; }
.btn-cancel { background:transparent; border:1px solid var(--border); padding:6px 12px; border-radius:4px; cursor:pointer; font-size:10px; color:var(--text1); }
.btn-cancel:hover { background:var(--surface2); }
.btn-save { background:var(--blue); color:#fff; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:10px; font-weight:500; }
.btn-save:hover { background:#0d47a1; }
.btn-save:disabled { background:#ccc; cursor:not-allowed; }

/* ── RESPONSIVE ── */
@media (max-width:600px) {
  header { flex-wrap:wrap; gap:8px; }
  .hdr-mid { order:3; flex:1 1 100%; margin-top:8px; }
  .stats { grid-template-columns:1fr; }
  .controls-row { flex-direction:column; }
  .search-box { min-width:auto; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-title">DATAFORCE</div>
    <div class="login-desc">User Administration</div>
    <div id="login-error"></div>
    <div id="g_id_onload" data-client_id="851383087701-8i1p8pqkj91i5ejrfacnv2vfrq4l5g5j.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
    <div id="g_id_signin" data-type="standard"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo-area">
      <span style="color:#7aaed5; font-size:13px; font-weight:300; letter-spacing:2px;">DATAFORCE</span>
    </div>
    <div class="hdr-div"></div>
    <div class="hdr-mid">
      <h1 class="hdr-module-name">USER ADMINISTRATION</h1>
    </div>
    <div class="header-right">
      <div class="user-info"><span id="userName"></span> <button class="logout-btn" onclick="signOut()">Sign out</button></div>
    </div>
  </header>

  <main>
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;">
      <div>
        <p class="page-title">Manage Users</p>
        <p class="page-desc">Add, edit, or remove user access and permissions</p>
      </div>
    </div>

    <div class="controls-row">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name or email…" onkeyup="filterTable()" />
      </div>
      <select id="moduleFilter" class="filter-select" onchange="filterTable()">
        <option value="">All modules</option>
        <option value="booked">Booked</option>
        <option value="flown">Flown</option>
        <option value="dashboard">Dashboard</option>
        <option value="vvi_charters">VVI Charters</option>
        <option value="upload">Upload</option>
        <option value="admin">Admin</option>
      </select>
      <button class="add-btn" onclick="openNewUserModal()">+ Add User</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="totalUsers">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Active</div>
        <div class="stat-value" id="activeUsers">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Inactive</div>
        <div class="stat-value" id="inactiveUsers">0</div>
      </div>
    </div>

    <div id="loadingSpinner" class="loading">Loading users…</div>

    <div class="tbl-wrap" id="tableContainer" style="display:none;">
      <table class="dtbl">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Modules</th>
            <th>Sales Person</th>
            <th>Status</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div>

    <div id="emptyState" class="empty-state">No users found</div>
  </main>
</div>

<div id="editModal">
  <div class="modal">
    <h3 id="modalTitle">Edit user</h3>

    <div class="form-group">
      <label>Name</label>
      <input type="text" id="formName" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="formEmail" />
    </div>

    <div class="form-group">
      <label>Module access</label>
      <button type="button" class="select-all-btn" onclick="toggleSelectAllModules()">Select All</button>
      <div class="checkbox-group" id="modulesCheckboxes">
        <div class="checkbox-item">
          <input type="checkbox" id="mod-booked" value="booked" onchange="updateSelectAllModules()" />
          <label for="mod-booked">Booked</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="mod-flown" value="flown" onchange="updateSelectAllModules()" />
          <label for="mod-flown">Flown</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="mod-dashboard" value="dashboard" onchange="updateSelectAllModules()" />
          <label for="mod-dashboard">Dashboard</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="mod-vvi" value="vvi_charters" onchange="updateSelectAllModules()" />
          <label for="mod-vvi">VVI Charters</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="mod-upload" value="upload" onchange="updateSelectAllModules()" />
          <label for="mod-upload">Upload</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="mod-admin" value="admin" onchange="updateSelectAllModules()" />
          <label for="mod-admin">Admin</label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Allowed businesses</label>
      <button type="button" class="select-all-btn" onclick="toggleSelectAllBusinesses()">Select All</button>
      <div class="checkbox-group" id="businessesCheckboxes"></div>
    </div>

    <div class="form-group">
      <label>Sales person</label>
      <select id="formSalesPerson">
        <option value="">— All sales persons</option>
      </select>
    </div>

    <div class="form-group">
      <label>Status</label>
      <select id="formStatus">
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="saveUser()" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script src="../permission-guard.js"></script>
<script>
  const API_BASE = "https://dataforce-api-production.up.railway.app";
  const API_KEY = "We1ykcoHgFV16LPduzqw7qGJlMBPGE06U5L7y5Hg_6I";
  const ALLOWED_DOMAIN = "gsaforce.com";

  let currentUserEmail = '';
  let allUsers = [];
  let currentEditingUser = null;
  let allSalesPersons = [];

  const BUSINESSES = [
    "MERC_LOCAL", "MERC_GSA", "MERC_ALL", "CXMEX",
    "01_CXOFF", "01_CXSUD", "02_ET", "03_UPS", "03_UPS_805",
    "04_ELAL", "04_ELAL_805", "05_AVASIA", "07_JPN",
    "08_AVCHI", "09_AVOTHER", "10_VIRGIN", "10_VIRGIN_805",
    "11_ULTRACN"
  ];

  function adminHeaders() {
    return {
      "x-api-key": API_KEY,
      "x-user-email": currentUserEmail
    };
  }

  function startAdminApp() {
    checkModuleAccess('admin', () => {
      showApp();
      loadUsers();
      loadSalesPersons();
    });
  }

  function handleCredentialResponse(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = payload.email || '';
    const name = payload.given_name || email.split('@')[0];
    const domain = email.split('@')[1] || '';
    
    if (domain !== ALLOWED_DOMAIN) {
      document.getElementById('login-error').textContent = 'Access denied. Please use a GSA Force email.';
      document.getElementById('login-error').style.display = 'block';
      return;
    }

    currentUserEmail = email;
    document.getElementById('userName').textContent = name;
    sessionStorage.setItem('df_user', JSON.stringify({ email, name }));

    startAdminApp();
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  }

  function signOut() {
    currentUserEmail = '';
    sessionStorage.removeItem('df_user');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  async function loadUsers() {
    try {
      const r = await fetch(`${API_BASE}/api/users?limit=500`, {
        headers: adminHeaders()
      });
      if (!r.ok) throw new Error(`API error: ${r.status}`);
      const data = await r.json();
      allUsers = data.users || [];
      renderTable();
      updateStats();
      populateBusinessCheckboxes();
    } catch (e) {
      console.error('Failed to load users:', e);
      document.getElementById('loadingSpinner').textContent = 'Error loading users. Please refresh.';
    }
  }

  async function loadSalesPersons() {
    try {
      const r = await fetch(`${API_BASE}/api/users/sales-persons`, {
        headers: adminHeaders()
      });
      if (!r.ok) throw new Error(`API error: ${r.status}`);
      const data = await r.json();
      allSalesPersons = data.sales_persons || [];
      populateSalesPersonSelect();
    } catch (e) {
      console.error('Failed to load sales persons:', e);
    }
  }

  function populateBusinessCheckboxes() {
    const container = document.getElementById('businessesCheckboxes');
    container.innerHTML = '';
    BUSINESSES.forEach(biz => {
      const div = document.createElement('div');
      div.className = 'checkbox-item';
      div.innerHTML = `
        <input type="checkbox" id="biz-${biz}" value="${biz}" onchange="updateSelectAllBusinesses()" />
        <label for="biz-${biz}">${biz}</label>
      `;
      container.appendChild(div);
    });
  }

  function populateSalesPersonSelect() {
    const select = document.getElementById('formSalesPerson');
    allSalesPersons.forEach(person => {
      const option = document.createElement('option');
      option.value = person;
      option.textContent = person;
      select.appendChild(option);
    });
  }

  function toggleSelectAllModules() {
    const checkboxes = document.querySelectorAll('#modulesCheckboxes input[type="checkbox"]');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    checkboxes.forEach(cb => cb.checked = !allChecked);
    updateSelectAllModules();
  }

  function updateSelectAllModules() {
    const checkboxes = document.querySelectorAll('#modulesCheckboxes input[type="checkbox"]');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    const btn = document.querySelector('#modulesCheckboxes').previousElementSibling;
    btn.textContent = allChecked ? 'Deselect All' : 'Select All';
  }

  function toggleSelectAllBusinesses() {
    const checkboxes = document.querySelectorAll('#businessesCheckboxes input[type="checkbox"]');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    checkboxes.forEach(cb => cb.checked = !allChecked);
    updateSelectAllBusinesses();
  }

  function updateSelectAllBusinesses() {
    const checkboxes = document.querySelectorAll('#businessesCheckboxes input[type="checkbox"]');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    const btn = document.querySelector('#businessesCheckboxes').previousElementSibling;
    btn.textContent = allChecked ? 'Deselect All' : 'Select All';
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    if (allUsers.length === 0) {
      document.getElementById('loadingSpinner').style.display = 'none';
      document.getElementById('tableContainer').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    allUsers.forEach(user => {
      const row = document.createElement('tr');
      const modules = (user.modules || []).join(', ') || '—';
      const salesPerson = user.sales_person || '—';
      const status = user.status || 'active';

      row.innerHTML = `
        <td><strong>${user.name || '—'}</strong></td>
        <td>${user.email}</td>
        <td>${modules}</td>
        <td>${salesPerson}</td>
        <td><span class="status-badge ${status === 'active' ? 'status-active' : 'status-inactive'}">${status === 'active' ? 'Active' : 'Inactive'}</span></td>
        <td style="text-align:right;">
          <button class="btn-edit" onclick="editUser(${user.id})">Edit</button>
          <button class="btn-delete" onclick="deleteUser(${user.id})">Del</button>
        </td>
      `;
      tbody.appendChild(row);
    });

    document.getElementById('loadingSpinner').style.display = 'none';
    document.getElementById('tableContainer').style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';
  }

  function updateStats() {
    document.getElementById('totalUsers').textContent = allUsers.length;
    const active = allUsers.filter(u => u.status !== 'inactive').length;
    const inactive = allUsers.filter(u => u.status === 'inactive').length;
    document.getElementById('activeUsers').textContent = active;
    document.getElementById('inactiveUsers').textContent = inactive;
  }

  function filterTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const module = document.getElementById('moduleFilter').value;

    const rows = document.querySelectorAll('#tableBody tr');
    rows.forEach(row => {
      const name = row.cells[0].textContent.toLowerCase();
      const email = row.cells[1].textContent.toLowerCase();
      const modules = row.cells[2].textContent.toLowerCase();

      const matchesSearch = name.includes(search) || email.includes(search);
      const matchesModule = !module || modules.includes(module);

      row.style.display = matchesSearch && matchesModule ? '' : 'none';
    });
  }

  function openNewUserModal() {
    currentEditingUser = null;
    document.getElementById('modalTitle').textContent = 'Create new user';
    document.getElementById('formName').value = '';
    document.getElementById('formEmail').value = '';
    document.getElementById('formSalesPerson').value = '';
    document.getElementById('formStatus').value = 'active';
    document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.getElementById('editModal').classList.add('active');
    document.getElementById('saveBtn').textContent = 'Create';
    updateSelectAllModules();
    updateSelectAllBusinesses();
  }

  function editUser(userId) {
    const user = allUsers.find(u => u.id === userId);
    if (!user) return;

    currentEditingUser = user;
    document.getElementById('modalTitle').textContent = 'Edit user';
    document.getElementById('formName').value = user.name || '';
    document.getElementById('formEmail').value = user.email || '';
    document.getElementById('formSalesPerson').value = user.sales_person || '';
    document.getElementById('formStatus').value = user.status || 'active';

    document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach(cb => {
      cb.checked = (user.modules || []).includes(cb.value);
    });

    document.querySelectorAll('#businessesCheckboxes input[type="checkbox"]').forEach(cb => {
      cb.checked = (user.allowed_businesses || []).includes(cb.value);
    });

    document.getElementById('editModal').classList.add('active');
    document.getElementById('saveBtn').textContent = 'Save';
    updateSelectAllModules();
    updateSelectAllBusinesses();
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
  }

  async function saveUser() {
    const name = document.getElementById('formName').value.trim();
    const email = document.getElementById('formEmail').value.trim();
    const modules = Array.from(document.querySelectorAll('#modulesCheckboxes input[type="checkbox"]:checked')).map(cb => cb.value);
    const businesses = Array.from(document.querySelectorAll('#businessesCheckboxes input[type="checkbox"]:checked')).map(cb => cb.value);
    const salesPerson = document.getElementById('formSalesPerson').value || null;
    const status = document.getElementById('formStatus').value;

    if (!name || !email) {
      alert('Please fill in name and email');
      return;
    }

    if (modules.length === 0) {
      alert('Please select at least one module');
      return;
    }

    if (businesses.length === 0) {
      alert('Please select at least one business');
      return;
    }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;

    try {
      const isNew = !currentEditingUser;
      const method = isNew ? 'POST' : 'PUT';
      const url = isNew 
        ? `${API_BASE}/api/users?email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}&modules=${encodeURIComponent(JSON.stringify(modules))}&allowed_businesses=${encodeURIComponent(JSON.stringify(businesses))}&sales_person=${encodeURIComponent(salesPerson || '')}`
        : `${API_BASE}/api/users/${currentEditingUser.id}?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&modules=${encodeURIComponent(JSON.stringify(modules))}&allowed_businesses=${encodeURIComponent(JSON.stringify(businesses))}&sales_person=${encodeURIComponent(salesPerson || '')}`;

      const r = await fetch(url, {
        method,
        headers: adminHeaders()
      });

      if (!r.ok) {
        const err = await r.json();
        throw new Error(err.detail || `API error: ${r.status}`);
      }

      closeEditModal();
      await loadUsers();
      alert(isNew ? 'User created successfully' : 'User updated successfully');
    } catch (e) {
      console.error('Save error:', e);
      alert('Error: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteUser(userId) {
    if (!confirm('Are you sure? This cannot be undone.')) return;

    try {
      const r = await fetch(`${API_BASE}/api/users/${userId}`, {
        method: 'DELETE',
        headers: adminHeaders()
      });

      if (!r.ok) throw new Error(`Delete failed: ${r.status}`);
      await loadUsers();
      alert('User deleted successfully');
    } catch (e) {
      console.error('Delete error:', e);
      alert('Error: ' + e.message);
    }
  }

  window.addEventListener('load', () => {
    const saved = sessionStorage.getItem('df_user');
    if (saved) {
      const { name, email } = JSON.parse(saved);
      currentUserEmail = email;
      document.getElementById('userName').textContent = name;
      startAdminApp();
    }
  });
</script>
</body>
</html>
