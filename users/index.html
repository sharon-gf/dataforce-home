<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATAFORCE — User Administration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow-x: hidden; background: #e8eaee; font-family: 'Inter', sans-serif; }

  .dash { padding: 8px; min-height: 100vh; }

  /* HEADER */
  .header {
    background: #0d1f3c;
    border-radius: 6px;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-text { color: #7aaed5; font-size: 13px; font-weight: 300; letter-spacing: 2px; }
  .hdr-mid { color: #7aaed5; font-size: 12px; font-weight: 300; letter-spacing: 1px; text-align: center; flex: 1; }
  .hdr-right { text-align: right; }
  .user-name { color: #fff; font-size: 12px; font-weight: 400; }
  .logout-btn { background: transparent; border: 1px solid #7aaed5; color: #7aaed5; padding: 5px 12px; border-radius: 3px; font-size: 10px; cursor: pointer; margin-left: 10px; transition: all 0.2s; }
  .logout-btn:hover { background: #7aaed5; color: #0d1f3c; }

  /* LOGIN */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0d1f3c; }
  .login-box { background: #1a2a45; padding: 2rem; border-radius: 6px; text-align: center; width: 100%; max-width: 360px; border: 1px solid #7aaed5; }
  .login-title { color: #7aaed5; font-size: 16px; font-weight: 400; letter-spacing: 1px; margin-bottom: 1rem; }
  .login-desc { color: #7aaed5; font-size: 11px; font-weight: 300; margin-bottom: 1.5rem; }
  #login-error { display: none; background: #8b3a3a; color: #ffcccc; padding: 10px; border-radius: 4px; font-size: 11px; margin-bottom: 1rem; }

  /* MAIN */
  #app { display: none; flex-direction: column; min-height: 100vh; background: #e8eaee; }

  /* CONTENT */
  .content { padding: 20px 120px; }
  .page-title { color: #0d1f3c; font-size: 18px; font-weight: 500; letter-spacing: 0.3px; margin-bottom: 6px; }
  .page-desc { color: #7aaed5; font-size: 10px; font-weight: 300; margin-bottom: 16px; }

  /* CONTROLS */
  .controls { background: #fff; border-radius: 5px; padding: 10px; margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; border: 1px solid #d0d4dc; }
  .controls input, .controls select { padding: 6px 8px; border: 1px solid #d0d4dc; border-radius: 4px; font-size: 11px; font-family: inherit; background: #fff; color: #444; }
  .controls input { flex: 1; min-width: 180px; }
  .controls input:focus, .controls select:focus { outline: none; border-color: #093c71; box-shadow: 0 0 0 2px rgba(9, 60, 113, 0.1); }

  /* ADD USER BUTTON */
  .add-btn { background: #093c71; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 10px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .add-btn:hover { background: #0d1f3c; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat { background: #fff; padding: 10px; border-radius: 5px; border: 1px solid #d0d4dc; text-align: center; }
  .stat-label { font-size: 8px; color: #aaa; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 500; color: #093c71; }

  /* TABLE */
  .table-wrapper { background: #fff; border-radius: 5px; border: 1px solid #d0d4dc; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 10px; }
  thead { background: #f8f9fc; border-bottom: 1.5px solid #093c71; }
  th { color: #093c71; padding: 6px 8px; text-align: left; font-weight: 500; font-size: 9px; }
  th:nth-child(3) { text-align: center; }
  th:nth-child(n+4) { text-align: right; }
  tbody tr { border-bottom: 1px solid #f5f5f5; }
  tbody tr:hover { background: #f5f8ff; }
  td { padding: 6px 8px; color: #444; text-align: left; }
  td:nth-child(3) { text-align: center; }
  td:nth-child(n+4) { text-align: right; }
  .email-col { color: #999; font-size: 9px; }
  .modules-col { font-size: 9px; color: #666; }
  .status-badge { display: inline-block; padding: 3px 6px; border-radius: 3px; font-size: 8px; font-weight: 500; }
  .status-active { background: #c7e9c0; color: #093c71; }

  /* BUTTONS */
  .btn-edit, .btn-delete { background: transparent; border: 1px solid #d0d4dc; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 8px; color: #444; transition: all 0.2s; }
  .btn-edit:hover { background: #093c71; color: #fff; border-color: #093c71; }
  .btn-delete:hover { background: #8b3a3a; color: #fff; border-color: #8b3a3a; }

  /* LOADING */
  .loading { text-align: center; color: #7aaed5; padding: 40px; font-size: 11px; }

  /* EMPTY STATE */
  .empty-state { display: none; text-align: center; padding: 30px; color: #999; font-size: 11px; background: #fff; border-radius: 5px; border: 1px solid #d0d4dc; }

  /* MODAL */
  #editModal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
  #editModal.active { display: flex; }
  .modal { background: #fff; border-radius: 6px; padding: 16px; max-width: 450px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid #d0d4dc; }
  .modal h3 { color: #0d1f3c; font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 9px; font-weight: 500; color: #0d1f3c; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
  .form-group input, .form-group select { width: 100%; padding: 6px 8px; border: 1px solid #d0d4dc; border-radius: 4px; font-size: 11px; font-family: inherit; background: #fff; color: #444; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #093c71; box-shadow: 0 0 0 2px rgba(9, 60, 113, 0.1); }

  .checkbox-group { border: 1px solid #d0d4dc; border-radius: 4px; padding: 8px; max-height: 140px; overflow-y: auto; background: #f8f9fc; }
  .checkbox-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 10px; }
  .checkbox-item input { margin: 0; }
  .checkbox-item label { margin: 0; font-weight: 400; cursor: pointer; }
  .select-all-btn { font-size: 9px; color: #093c71; background: none; border: none; padding: 4px 0; cursor: pointer; font-weight: 500; margin-bottom: 6px; display: block; }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; border-top: 1px solid #d0d4dc; padding-top: 12px; }
  .btn-cancel { background: transparent; border: 1px solid #d0d4dc; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; color: #444; transition: all 0.2s; }
  .btn-cancel:hover { background: #f5f5f5; }
  .btn-save { background: #093c71; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 500; transition: all 0.2s; }
  .btn-save:hover { background: #0d1f3c; }
  .btn-save:disabled { background: #ccc; cursor: not-allowed; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .header { flex-wrap: wrap; }
    .hdr-mid { order: 3; flex: 1 1 100%; margin-top: 8px; }
    .stats { grid-template-columns: 1fr; }
    .controls { flex-direction: column; }
    .controls input { min-width: auto; }
    table { font-size: 9px; }
    th, td { padding: 4px 6px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">DATAFORCE</div>
    <div class="login-desc">User Administration</div>
    <div id="login-error"></div>
    <div id="g_id_onload" data-client_id="851383087701-8i1p8pqkj91i5ejrfacnv2vfrq4l5g5j.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
    <div id="g_id_signin" data-type="standard"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-text">DATAFORCE</div>
    </div>
    <div class="hdr-mid">USER ADMINISTRATION</div>
    <div class="hdr-right">
      <span class="user-name" id="userName"></span>
      <button class="logout-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="dash">
    <div class="content">
      <div class="page-title">Manage Users</div>
      <div class="page-desc">Add, edit, or remove user access and permissions</div>

      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 12px;">
        <div class="controls" style="flex: 1; margin-bottom: 0;">
          <input type="text" id="searchInput" placeholder="Search by name or email…" onkeyup="filterTable()" />
          <select id="moduleFilter" onchange="filterTable()">
            <option value="">All modules</option>
            <option value="booked">Booked</option>
            <option value="flown">Flown</option>
            <option value="dashboard">Dashboard</option>
            <option value="vvi_charters">VVI Charters</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button class="add-btn" onclick="openNewUserModal()">+ Add User</button>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="totalUsers">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Active</div>
          <div class="stat-value" id="activeUsers">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Inactive</div>
          <div class="stat-value" id="inactiveUsers">0</div>
        </div>
      </div>

      <div id="loadingSpinner" class="loading">Loading users…</div>

      <div class="table-wrapper" id="tableContainer" style="display: none;">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Modules</th>
              <th>Sales Person</th>
              <th>Status</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
          </tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state">No users found</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="editModal">
  <div class="modal">
    <h3 id="modalTitle">Edit user</h3>

    <div class="form-group">
      <label>Name</label>
      <input type="text" id="formName" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="formEmail" />
    </div>

    <div class="form-group">
      <label>Module access</label>
      <button type="button" class="select-all-btn" onclick="toggleSelectAllModules(this)">Select All</button>
      <div class="checkbox-group" id="modulesCheckboxes">
        <div class="checkbox-item">
          <input type="checkbox" id="mod-booked" value="booked" onchange="updateSelectAllModules()" />
          <label for="mod-booked">Booked</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="mod-flown" value="flown" onchange="updateSelectAllModules()" />
          <label for="mod-flown">Flown</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="mod-dashboard" value="dashboard" onchange="updateSelectAllModules()" />
          <label for="mod-dashboard">Dashboard</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="mod-vvi" value="vvi_charters" onchange="updateSelectAllModules()" />
          <label for="mod-vvi">VVI Charters</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="mod-admin" value="admin" onchange="updateSelectAllModules()" />
          <label for="mod-admin">Admin</label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Allowed businesses</label>
      <button type="button" class="select-all-btn" onclick="toggleSelectAllBusinesses(this)">Select All</button>
      <div class="checkbox-group" id="businessesCheckboxes"></div>
    </div>

    <div class="form-group">
      <label>Sales person</label>
      <select id="formSalesPerson">
        <option value="">— All sales persons</option>
      </select>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="saveUser()" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script>
  const API_BASE = "https://dataforce-api-production.up.railway.app";
  const API_KEY = "We1ykcoHgFV16LPduzqw7qGJlMBPGE06U5L7y5Hg_6I";
  const ALLOWED_DOMAIN = "gsaforce.com";

  let currentUserEmail = '';
  let allUsers = [];
  let currentEditingUser = null;
  let allSalesPersons = [];

  const BUSINESSES = [
    "MERC_LOCAL", "MERC_GSA", "MERC_ALL", "CXMEX",
    "01_CXOFF", "01_CXSUD", "02_ET", "03_UPS", "03_UPS_805",
    "04_ELAL", "04_ELAL_805", "05_AVASIA", "07_JPN",
    "08_AVCHI", "09_AVOTHER", "10_VIRGIN", "10_VIRGIN_805",
    "11_ULTRACN"
  ];

  function handleCredentialResponse(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = payload.email || '';
    const name = payload.given_name || email.split('@')[0];
    const domain = email.split('@')[1] || '';
    
    if (domain !== ALLOWED_DOMAIN) {
      document.getElementById('login-error').textContent = 'Access denied. Please use a GSA Force email.';
      document.getElementById('login-error').style.display = 'block';
      return;
    }

    currentUserEmail = email;
    document.getElementById('userName').textContent = name;
    sessionStorage.setItem('df_user', JSON.stringify({ email, name }));
    
    showApp();
    loadUsers();
    loadSalesPersons();
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  }

  function signOut() {
    currentUserEmail = '';
    sessionStorage.removeItem('df_user');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  async function loadUsers() {
    try {
      const r = await fetch(`${API_BASE}/api/users?limit=500`, {
        headers: { "x-api-key": API_KEY }
      });
      if (!r.ok) throw new Error(`API error: ${r.status}`);
      const data = await r.json();
      allUsers = data.users || [];
      renderTable();
      updateStats();
      populateBusinessCheckboxes();
    } catch (e) {
      console.error('Failed to load users:', e);
      document.getElementById('loadingSpinner').textContent = 'Error loading users. Please refresh.';
    }
  }

  async function loadSalesPersons() {
    try {
      const r = await fetch(`${API_BASE}/api/users/sales-persons`, {
        headers: { "x-api-key": API_KEY }
      });
      if (!r.ok) throw new Error(`API error: ${r.status}`);
      const data = await r.json();
      allSalesPersons = data.sales_persons || [];
      populateSalesPersonSelect();
    } catch (e) {
      console.error('Failed to load sales persons:', e);
    }
  }

  function populateBusinessCheckboxes() {
    const container = document.getElementById('businessesCheckboxes');
    container.innerHTML = '';
    BUSINESSES.forEach(biz => {
      const div = document.createElement('div');
      div.className = 'checkbox-item';
      div.innerHTML = `
        <input type="checkbox" id="biz-${biz}" value="${biz}" onchange="updateSelectAllBusinesses()" />
        <label for="biz-${biz}">${biz}</label>
      `;
      container.appendChild(div);
    });
  }

  function populateSalesPersonSelect() {
    const select = document.getElementById('formSalesPerson');
    allSalesPersons.forEach(person => {
      const option = document.createElement('option');
      option.value = person;
      option.textContent = person;
      select.appendChild(option);
    });
  }

  function toggleSelectAllModules(btn) {
    const checkboxes = document.querySelectorAll('#modulesCheckboxes input[type="checkbox"]');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    checkboxes.forEach(cb => cb.checked = !allChecked);
    updateSelectAllModules();
  }

  function updateSelectAllModules() {
    const checkboxes = document.querySelectorAll('#modulesCheckboxes input[type="checkbox"]');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    const btn = document.querySelector('#modulesCheckboxes').previousElementSibling;
    btn.textContent = allChecked ? 'Deselect All' : 'Select All';
  }

  function toggleSelectAllBusinesses(btn) {
    const checkboxes = document.querySelectorAll('#businessesCheckboxes input[type="checkbox"]');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    checkboxes.forEach(cb => cb.checked = !allChecked);
    updateSelectAllBusinesses();
  }

  function updateSelectAllBusinesses() {
    const checkboxes = document.querySelectorAll('#businessesCheckboxes input[type="checkbox"]');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    const btn = document.querySelector('#businessesCheckboxes').previousElementSibling;
    btn.textContent = allChecked ? 'Deselect All' : 'Select All';
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    if (allUsers.length === 0) {
      document.getElementById('loadingSpinner').style.display = 'none';
      document.getElementById('tableContainer').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    allUsers.forEach(user => {
      const row = document.createElement('tr');
      const modules = (user.modules || []).join(', ') || '—';
      const salesPerson = user.sales_person || '—';

      row.innerHTML = `
        <td><strong>${user.name || '—'}</strong></td>
        <td class="email-col">${user.email}</td>
        <td class="modules-col">${modules}</td>
        <td>${salesPerson}</td>
        <td><span class="status-badge status-active">Active</span></td>
        <td style="text-align: right;">
          <button class="btn-edit" onclick="editUser(${user.id})">Edit</button>
          <button class="btn-delete" onclick="deleteUser(${user.id})">Del</button>
        </td>
      `;
      tbody.appendChild(row);
    });

    document.getElementById('loadingSpinner').style.display = 'none';
    document.getElementById('tableContainer').style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';
  }

  function updateStats() {
    document.getElementById('totalUsers').textContent = allUsers.length;
    document.getElementById('activeUsers').textContent = allUsers.length;
    document.getElementById('inactiveUsers').textContent = 0;
  }

  function filterTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const module = document.getElementById('moduleFilter').value;

    const rows = document.querySelectorAll('#tableBody tr');
    rows.forEach(row => {
      const name = row.cells[0].textContent.toLowerCase();
      const email = row.cells[1].textContent.toLowerCase();
      const modules = row.cells[2].textContent.toLowerCase();

      const matchesSearch = name.includes(search) || email.includes(search);
      const matchesModule = !module || modules.includes(module);

      row.style.display = matchesSearch && matchesModule ? '' : 'none';
    });
  }

  function openNewUserModal() {
    currentEditingUser = null;
    document.getElementById('modalTitle').textContent = 'Create new user';
    document.getElementById('formName').value = '';
    document.getElementById('formEmail').value = '';
    document.getElementById('formSalesPerson').value = '';
    document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.getElementById('editModal').classList.add('active');
    document.getElementById('saveBtn').textContent = 'Create';
  }

  function editUser(userId) {
    const user = allUsers.find(u => u.id === userId);
    if (!user) return;

    currentEditingUser = user;
    document.getElementById('modalTitle').textContent = 'Edit user';
    document.getElementById('formName').value = user.name || '';
    document.getElementById('formEmail').value = user.email || '';
    document.getElementById('formSalesPerson').value = user.sales_person || '';

    document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach(cb => {
      cb.checked = (user.modules || []).includes(cb.value);
    });

    document.querySelectorAll('#businessesCheckboxes input[type="checkbox"]').forEach(cb => {
      cb.checked = (user.allowed_businesses || []).includes(cb.value);
    });

    document.getElementById('editModal').classList.add('active');
    document.getElementById('saveBtn').textContent = 'Save';
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
  }

  async function saveUser() {
    const name = document.getElementById('formName').value.trim();
    const email = document.getElementById('formEmail').value.trim();
    const modules = Array.from(document.querySelectorAll('#modulesCheckboxes input[type="checkbox"]:checked')).map(cb => cb.value);
    const businesses = Array.from(document.querySelectorAll('#businessesCheckboxes input[type="checkbox"]:checked')).map(cb => cb.value);
    const salesPerson = document.getElementById('formSalesPerson').value || null;

    if (!name || !email) {
      alert('Please fill in all required fields');
      return;
    }

    if (modules.length === 0) {
      alert('Please select at least one module');
      return;
    }

    if (businesses.length === 0) {
      alert('Please select at least one business');
      return;
    }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;

    try {
      const isNew = !currentEditingUser;
      const method = isNew ? 'POST' : 'PUT';
      const url = isNew 
        ? `${API_BASE}/api/users?email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}&modules=${encodeURIComponent(JSON.stringify(modules))}&allowed_businesses=${encodeURIComponent(JSON.stringify(businesses))}&sales_person=${encodeURIComponent(salesPerson || '')}`
        : `${API_BASE}/api/users/${currentEditingUser.id}?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&modules=${encodeURIComponent(JSON.stringify(modules))}&allowed_businesses=${encodeURIComponent(JSON.stringify(businesses))}&sales_person=${encodeURIComponent(salesPerson || '')}`;

      const r = await fetch(url, {
        method,
        headers: { "x-api-key": API_KEY }
      });

      if (!r.ok) {
        const err = await r.json();
        throw new Error(err.detail || `API error: ${r.status}`);
      }

      closeEditModal();
      await loadUsers();
      alert(isNew ? 'User created successfully' : 'User updated successfully');
    } catch (e) {
      alert('Error: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteUser(userId) {
    if (!confirm('Are you sure? This cannot be undone.')) return;

    try {
      const r = await fetch(`${API_BASE}/api/users/${userId}`, {
        method: 'DELETE',
        headers: { "x-api-key": API_KEY }
      });

      if (!r.ok) throw new Error(`Delete failed: ${r.status}`);
      await loadUsers();
      alert('User deleted successfully');
    } catch (e) {
      alert('Error deleting user: ' + e.message);
    }
  }

  window.addEventListener('load', () => {
    const saved = sessionStorage.getItem('df_user');
    if (saved) {
      const { name, email } = JSON.parse(saved);
      currentUserEmail = email;
      document.getElementById('userName').textContent = name;
      showApp();
      loadUsers();
      loadSalesPersons();
    }
  });
</script>
</body>
</html>
