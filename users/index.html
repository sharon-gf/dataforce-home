<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Administration - DATAFORCE</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    /* Login Screen */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
    }

    .login-box {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 360px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2rem;
      font-size: 24px;
      font-weight: 600;
      color: #1a56db;
    }

    .login-logo svg {
      width: 40px;
      height: 40px;
    }

    .login-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1a56db;
    }

    .login-desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 2rem;
    }

    #g_id_onload {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }

    #login-error {
      display: none;
      background: #fee;
      color: #c00;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 1rem;
    }

    /* Main App */
    #app {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      background: #f5f5f5;
    }

    header {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      color: #1a56db;
      text-decoration: none;
      font-size: 16px;
    }

    .logo svg {
      width: 32px;
      height: 32px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-info {
      font-size: 14px;
      color: #666;
    }

    .btn-logout {
      background: none;
      border: 1px solid #ddd;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #666;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: #f5f5f5;
      border-color: #999;
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .page-title {
      font-size: 28px;
      font-weight: 600;
      color: #1a56db;
    }

    .page-desc {
      font-size: 14px;
      color: #666;
      margin-top: 0.25rem;
    }

    .btn-primary {
      background: #1a56db;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary:hover {
      background: #0d3bb3;
    }

    /* Search & Filters */
    .controls {
      background: white;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 2rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls input,
    .controls select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    .controls input {
      flex: 1;
      min-width: 200px;
    }

    .controls select {
      min-width: 150px;
    }

    .controls input:focus,
    .controls select:focus {
      outline: none;
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
    }

    /* Stats Cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }

    .stat-label {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: #1a56db;
    }

    /* Table */
    .table-container {
      background: white;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: #f9f9f9;
      border-bottom: 1px solid #e0e0e0;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #333;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    .email-col {
      color: #666;
      font-size: 13px;
    }

    .modules-col {
      font-size: 13px;
      color: #666;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-active {
      background: #d1fae5;
      color: #065f46;
    }

    .status-inactive {
      background: #f3f4f6;
      color: #6b7280;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn-edit {
      background: transparent;
      border: 1px solid #ddd;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      transition: all 0.2s;
    }

    .btn-edit:hover {
      background: #1a56db;
      color: white;
      border-color: #1a56db;
    }

    .btn-delete {
      background: transparent;
      border: 1px solid #ddd;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #c00;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: #fee;
      border-color: #c00;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 8px;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #333;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
    }

    .checkbox-group {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      max-height: 150px;
      overflow-y: auto;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 14px;
    }

    .checkbox-item input[type="checkbox"] {
      width: auto;
      margin: 0;
      cursor: pointer;
    }

    .checkbox-item label {
      margin: 0;
      font-weight: 400;
      cursor: pointer;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 2rem;
      border-top: 1px solid #e0e0e0;
      padding-top: 1rem;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid #ddd;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #333;
      transition: all 0.2s;
    }

    .btn-cancel:hover {
      background: #f5f5f5;
      border-color: #999;
    }

    .btn-save {
      background: #1a56db;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-save:hover {
      background: #0d3bb3;
    }

    .btn-save:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* Loading & Empty States */
    .loading {
      text-align: center;
      padding: 2rem;
      color: #999;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: #999;
    }

    .empty-state p {
      margin: 0;
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="8" r="4"/>
          <path d="M12 14c-5 0-8 3-8 3v5h16v-5s-3-3-8-3z"/>
        </svg>
        DATAFORCE
      </div>
      <div class="login-title">User Administration</div>
      <div class="login-desc">Sign in with your GSA Force email</div>
      <div id="login-error"></div>
      <div id="g_id_onload" data-client_id="851383087701-8i1p8pqkj91i5ejrfacnv2vfrq4l5g5j.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
      <div id="g_id_signin" data-type="standard"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <header>
      <a class="logo" href="https://dataforce.gsaforce.com/">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="8" r="4"/>
          <path d="M12 14c-5 0-8 3-8 3v5h16v-5s-3-3-8-3z"/>
        </svg>
        User Admin
      </a>
      <div class="header-right">
        <div class="user-info"><span id="userName"></span></div>
        <button class="btn-logout" onclick="signOut()">Sign out</button>
      </div>
    </header>

    <main>
      <div class="page-header">
        <div>
          <h1 class="page-title">User administration</h1>
          <p class="page-desc">Manage user access, roles and permissions</p>
        </div>
        <button class="btn-primary" onclick="openNewUserModal()">
          <span>+</span> Add user
        </button>
      </div>

      <div class="controls">
        <input type="text" id="searchInput" placeholder="Search by name or email…" onkeyup="filterTable()" />
        <select id="moduleFilter" onchange="filterTable()">
          <option value="">All modules</option>
          <option value="booked">Booked</option>
          <option value="flown">Flown</option>
          <option value="dashboard">Dashboard</option>
          <option value="vvi_charters">VVI Charters</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="stats" id="statsContainer" style="display: none;">
        <div class="stat-card">
          <div class="stat-label">Total users</div>
          <div class="stat-value" id="totalUsers">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active</div>
          <div class="stat-value" id="activeUsers">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Inactive</div>
          <div class="stat-value" id="inactiveUsers">0</div>
        </div>
      </div>

      <div id="loadingSpinner" class="loading">Loading users…</div>

      <div class="table-container" id="tableContainer" style="display: none;">
        <table id="usersTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Modules</th>
              <th>Sales Person</th>
              <th>Status</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
          </tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <p>No users found</p>
      </div>
    </main>
  </div>

  <!-- EDIT MODAL -->
  <div id="editModal" class="modal-overlay">
    <div class="modal">
      <h3 id="modalTitle">Edit user</h3>

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="formName" placeholder="e.g., Sharon Chen" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="formEmail" placeholder="e.g., sharon@gsaforce.com" />
      </div>

      <div class="form-group">
        <label style="margin-bottom: 8px;">Module access</label>
        <div class="checkbox-group" id="modulesCheckboxes">
          <div class="checkbox-item">
            <input type="checkbox" id="mod-booked" value="booked" />
            <label for="mod-booked">Booked Report</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="mod-flown" value="flown" />
            <label for="mod-flown">Flown Report</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="mod-dashboard" value="dashboard" />
            <label for="mod-dashboard">Dashboard</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="mod-vvi" value="vvi_charters" />
            <label for="mod-vvi">VVI Charters</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="mod-admin" value="admin" />
            <label for="mod-admin">Admin</label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label style="margin-bottom: 8px;">Allowed businesses</label>
        <div class="checkbox-group" id="businessesCheckboxes">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="form-group">
        <label>Sales person filter (optional)</label>
        <select id="formSalesPerson">
          <option value="">— All sales persons</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
        <button class="btn-save" onclick="saveUser()" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://dataforce-api-production.up.railway.app";
    const API_KEY = "We1ykcoHgFV16LPduzqw7qGJlMBPGE06U5L7y5Hg_6I";
    const ALLOWED_DOMAIN = "gsaforce.com";

    let currentUserEmail = '';
    let allUsers = [];
    let currentEditingUser = null;
    let allBusinesses = [];
    let allSalesPersons = [];

    // Hardcoded business list (from api__gsaf_.py)
    const BUSINESSES = [
      "MERC_LOCAL", "MERC_GSA", "MERC_ALL", "CXMEX",
      "01_CXOFF", "01_CXSUD", "02_ET", "03_UPS", "03_UPS_805",
      "04_ELAL", "04_ELAL_805", "05_AVASIA", "07_JPN",
      "08_AVCHI", "09_AVOTHER", "10_VIRGIN", "10_VIRGIN_805",
      "11_ULTRACN"
    ];

    function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      const email = payload.email || '';
      const name = payload.given_name || email.split('@')[0];
      const domain = email.split('@')[1] || '';
      
      if (domain !== ALLOWED_DOMAIN) {
        document.getElementById('login-error').textContent = 'Access denied. Please use a GSA Force email.';
        document.getElementById('login-error').style.display = 'block';
        return;
      }

      currentUserEmail = email;
      document.getElementById('userName').textContent = name;
      sessionStorage.setItem('df_user', JSON.stringify({ email, name }));
      
      showApp();
      loadUsers();
      loadSalesPersons();
    }

    function showApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
    }

    function signOut() {
      currentUserEmail = '';
      sessionStorage.removeItem('df_user');
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }

    async function loadUsers() {
      try {
        const r = await fetch(`${API_BASE}/api/users?limit=500`, {
          headers: { "x-api-key": API_KEY }
        });
        if (!r.ok) throw new Error(`API error: ${r.status}`);
        const data = await r.json();
        allUsers = data.users || [];

        renderTable();
        updateStats();
        populateBusinessCheckboxes();
      } catch (e) {
        console.error('Failed to load users:', e);
        document.getElementById('loadingSpinner').textContent = 'Error loading users. Please refresh.';
      }
    }

    async function loadSalesPersons() {
      try {
        const r = await fetch(`${API_BASE}/api/users/sales-persons`, {
          headers: { "x-api-key": API_KEY }
        });
        if (!r.ok) throw new Error(`API error: ${r.status}`);
        const data = await r.json();
        allSalesPersons = data.sales_persons || [];
        populateSalesPersonSelect();
      } catch (e) {
        console.error('Failed to load sales persons:', e);
      }
    }

    function populateBusinessCheckboxes() {
      const container = document.getElementById('businessesCheckboxes');
      container.innerHTML = '';
      BUSINESSES.forEach(biz => {
        const div = document.createElement('div');
        div.className = 'checkbox-item';
        div.innerHTML = `
          <input type="checkbox" id="biz-${biz}" value="${biz}" />
          <label for="biz-${biz}">${biz}</label>
        `;
        container.appendChild(div);
      });
    }

    function populateSalesPersonSelect() {
      const select = document.getElementById('formSalesPerson');
      allSalesPersons.forEach(person => {
        const option = document.createElement('option');
        option.value = person;
        option.textContent = person;
        select.appendChild(option);
      });
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      if (allUsers.length === 0) {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('tableContainer').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      allUsers.forEach(user => {
        const row = document.createElement('tr');
        const modules = (user.modules || []).join(', ') || '—';
        const salesPerson = user.sales_person || '—';
        const isActive = true; // You could add a status field to the DB

        row.innerHTML = `
          <td>${user.name || '—'}</td>
          <td class="email-col">${user.email}</td>
          <td class="modules-col">${modules}</td>
          <td>${salesPerson}</td>
          <td><span class="status-badge ${isActive ? 'status-active' : 'status-inactive'}">${isActive ? 'Active' : 'Inactive'}</span></td>
          <td style="text-align: right;">
            <div class="actions">
              <button class="btn-edit" onclick="editUser(${user.id})">Edit</button>
              <button class="btn-delete" onclick="deleteUser(${user.id})">Delete</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById('loadingSpinner').style.display = 'none';
      document.getElementById('tableContainer').style.display = 'block';
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('statsContainer').style.display = 'grid';
    }

    function updateStats() {
      document.getElementById('totalUsers').textContent = allUsers.length;
      document.getElementById('activeUsers').textContent = allUsers.length; // All are active for now
      document.getElementById('inactiveUsers').textContent = 0;
    }

    function filterTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const module = document.getElementById('moduleFilter').value;

      const rows = document.querySelectorAll('#tableBody tr');
      rows.forEach(row => {
        const name = row.cells[0].textContent.toLowerCase();
        const email = row.cells[1].textContent.toLowerCase();
        const modules = row.cells[2].textContent.toLowerCase();

        const matchesSearch = name.includes(search) || email.includes(search);
        const matchesModule = !module || modules.includes(module);

        row.style.display = matchesSearch && matchesModule ? '' : 'none';
      });
    }

    function openNewUserModal() {
      currentEditingUser = null;
      document.getElementById('modalTitle').textContent = 'Create new user';
      document.getElementById('formName').value = '';
      document.getElementById('formEmail').value = '';
      document.getElementById('formSalesPerson').value = '';
      document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach(cb => cb.checked = false);
      document.getElementById('editModal').classList.add('active');
      document.getElementById('saveBtn').textContent = 'Create';
    }

    function editUser(userId) {
      const user = allUsers.find(u => u.id === userId);
      if (!user) return;

      currentEditingUser = user;
      document.getElementById('modalTitle').textContent = 'Edit user';
      document.getElementById('formName').value = user.name || '';
      document.getElementById('formEmail').value = user.email || '';
      document.getElementById('formSalesPerson').value = user.sales_person || '';

      // Check modules
      document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach(cb => {
        cb.checked = (user.modules || []).includes(cb.value);
      });

      // Check businesses
      document.querySelectorAll('#businessesCheckboxes input[type="checkbox"]').forEach(cb => {
        cb.checked = (user.allowed_businesses || []).includes(cb.value);
      });

      document.getElementById('editModal').classList.add('active');
      document.getElementById('saveBtn').textContent = 'Save';
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
    }

    async function saveUser() {
      const name = document.getElementById('formName').value.trim();
      const email = document.getElementById('formEmail').value.trim();
      const modules = Array.from(document.querySelectorAll('#modulesCheckboxes input[type="checkbox"]:checked')).map(cb => cb.value);
      const businesses = Array.from(document.querySelectorAll('#businessesCheckboxes input[type="checkbox"]:checked')).map(cb => cb.value);
      const salesPerson = document.getElementById('formSalesPerson').value || null;

      if (!name || !email) {
        alert('Please fill in all required fields');
        return;
      }

      if (modules.length === 0) {
        alert('Please select at least one module');
        return;
      }

      if (businesses.length === 0) {
        alert('Please select at least one business');
        return;
      }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;

      try {
        const isNew = !currentEditingUser;
        const method = isNew ? 'POST' : 'PUT';
        const url = isNew 
          ? `${API_BASE}/api/users?email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}&modules=${encodeURIComponent(JSON.stringify(modules))}&allowed_businesses=${encodeURIComponent(JSON.stringify(businesses))}&sales_person=${encodeURIComponent(salesPerson || '')}`
          : `${API_BASE}/api/users/${currentEditingUser.id}?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&modules=${encodeURIComponent(JSON.stringify(modules))}&allowed_businesses=${encodeURIComponent(JSON.stringify(businesses))}&sales_person=${encodeURIComponent(salesPerson || '')}`;

        const r = await fetch(url, {
          method,
          headers: { "x-api-key": API_KEY }
        });

        if (!r.ok) {
          const err = await r.json();
          throw new Error(err.detail || `API error: ${r.status}`);
        }

        closeEditModal();
        await loadUsers();
        alert(isNew ? 'User created successfully' : 'User updated successfully');
      } catch (e) {
        alert('Error: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function deleteUser(userId) {
      if (!confirm('Are you sure? This cannot be undone.')) return;

      try {
        const r = await fetch(`${API_BASE}/api/users/${userId}`, {
          method: 'DELETE',
          headers: { "x-api-key": API_KEY }
        });

        if (!r.ok) throw new Error(`Delete failed: ${r.status}`);
        await loadUsers();
        alert('User deleted successfully');
      } catch (e) {
        alert('Error deleting user: ' + e.message);
      }
    }

    window.addEventListener('load', () => {
      const saved = sessionStorage.getItem('df_user');
      if (saved) {
        const { name, email } = JSON.parse(saved);
        currentUserEmail = email;
        document.getElementById('userName').textContent = name;
        showApp();
        loadUsers();
        loadSalesPersons();
      }
    });
  </script>
</body>
</html>
